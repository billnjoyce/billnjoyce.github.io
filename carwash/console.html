<head>

<script type="module">

import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged,
         setPersistence, browserLocalPersistence }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update }               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ── Firebase 설정 ── */
const app = initializeApp({
  apiKey:            "AIzaSyAoUQNXqxHfS1JmpIOU-etlM57b2WEidio",
  authDomain:        "carwash-4699b.firebaseapp.com",
  databaseURL:       "https://carwash-4699b.firebaseio.com",
  projectId:         "carwash-4699b",
  storageBucket:     "carwash-4699b.appspot.com",
  messagingSenderId: "209684707726",
  appId:             "1:209684707726:ios:feabc8fc02d4dec8a48cdf"
});
const auth = getAuth(app);
const db   = getDatabase(app);

/* ══════════════════════════════════════
   24시간 쿠키 세션 관리
   Firebase Auth 자체 persistence + 별도 쿠키로 만료 제어
══════════════════════════════════════ */
const SESSION_KEY  = "seal_console_session";
const SESSION_TTL  = 24 * 60 * 60 * 1000; // 24시간(ms)

function saveSession(uid, email) {
  const data = { uid, email, exp: Date.now() + SESSION_TTL };
  document.cookie = `${SESSION_KEY}=${encodeURIComponent(JSON.stringify(data))};max-age=${SESSION_TTL/1000};path=/;SameSite=Strict`;
  localStorage.setItem(SESSION_KEY, JSON.stringify(data));
}

function loadSession() {
  // cookie 우선, fallback localStorage
  const fromCookie = document.cookie.split(";").find(c => c.trim().startsWith(SESSION_KEY + "="));
  if (fromCookie) {
    try {
      const raw = decodeURIComponent(fromCookie.split("=").slice(1).join("="));
      return JSON.parse(raw);
    } catch {}
  }
  try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); } catch { return null; }
}

function clearSession() {
  document.cookie = `${SESSION_KEY}=;max-age=0;path=/`;
  localStorage.removeItem(SESSION_KEY);
}

function isSessionValid() {
  const s = loadSession();
  if (!s || !s.exp) return false;
  return Date.now() < s.exp;
}

/* ══════════════════════════════════════
   GLOBAL STATE
══════════════════════════════════════ */
let STATE = {
  page: "dashboard",
  shops: {},          // key = shopId
  shopsByBN: {},      // key = 정규화된 사업자번호
  users: {},
  stats: { installs: 0, dau: 0, funnel: {} }
};

/* ══════════════════════════════════════
   AUTH — 24시간 세션 유지
══════════════════════════════════════ */
// Firebase 자체 persistence를 LOCAL로 설정 (브라우저 재시작해도 유지)
setPersistence(auth, browserLocalPersistence).catch(() => {});

onAuthStateChanged(auth, async user => {
  if (user) {
    // 세션 쿠키 유효 여부 확인
    if (!isSessionValid()) {
      // 24시간 만료 → 강제 로그아웃
      await signOut(auth);
      clearSession();
      showLogin("세션이 만료되었습니다. 다시 로그인해 주세요.");
      return;
    }
    showApp(user);
    loadAll();
  } else {
    clearSession();
    showLogin();
  }
});

// 페이지 로드 시 세션 만료 선확인 (onAuthStateChanged 전에)
window.addEventListener("load", () => {
  const s = loadSession();
  if (s && !isSessionValid()) {
    clearSession();
    signOut(auth).catch(() => {});
  }
});

async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const btn   = document.getElementById("loginBtn");
  const err   = document.getElementById("loginErr");
  err.textContent = "";
  if (!email || !pw) { err.textContent = "이메일과 비밀번호를 입력해 주세요."; return; }
  btn.disabled = true; btn.textContent = "로그인 중...";
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    saveSession(cred.user.uid, cred.user.email);
  } catch(e) {
    err.textContent = ["auth/invalid-credential","auth/wrong-password","auth/user-not-found"]
      .includes(e.code)
      ? "이메일 또는 비밀번호가 올바르지 않습니다."
      : "로그인에 실패했습니다. 다시 시도해 주세요.";
    btn.disabled = false; btn.textContent = "로그인";
  }
}

function logout() {
  if (!confirm("로그아웃 하시겠습니까?")) return;
  clearSession();
  signOut(auth);
}

/* ══════════════════════════════════════
   DATA — 사업자번호 기준 고유 관리
══════════════════════════════════════ */
function normBN(bn) {
  return (bn || "").replace(/-/g, "").trim();
}

async function loadAll() {
  showLoadingBar(true);
  try {
    const snap = await get(ref(db, "carwash-master"));
    if (!snap.exists()) { showLoadingBar(false); renderPage(); return; }
    const data = snap.val();

    /* ── shops: 사업자번호 기준 고유 인덱스 구성 ── */
    const rawShops = data.data?.shops || {};
    STATE.shops    = rawShops;
    STATE.shopsByBN = {};

    // 사업자번호 중복 그룹 탐지
    const bnMap = {}; // normBN → [shopId, ...]
    Object.entries(rawShops).forEach(([sid, s]) => {
      const bn = normBN(s.businessNumber);
      if (!bn) return;
      if (!bnMap[bn]) bnMap[bn] = [];
      bnMap[bn].push(sid);
      // 가장 최근 등록 기준으로 대표 샵 설정
      if (!STATE.shopsByBN[bn] || s.createdAt > STATE.shopsByBN[bn].createdAt) {
        STATE.shopsByBN[bn] = { ...s, id: sid, _duplicates: [] };
      }
    });
    // 중복 플래그
    Object.entries(bnMap).forEach(([bn, ids]) => {
      if (ids.length > 1 && STATE.shopsByBN[bn]) {
        STATE.shopsByBN[bn]._duplicates = ids.filter(id => id !== STATE.shopsByBN[bn].id);
      }
    });

    /* ── users ── */
    STATE.users = data.users || {};

    /* ── stats ── */
    STATE.stats.installs = Object.keys(data.install?.ios || {}).length;
    const today = todayStr();
    let dau = 0;
    Object.values(data.dau?.[today]?.ios || {}).forEach(v => { dau += Object.keys(v).length; });
    STATE.stats.dau = dau;
    STATE.stats.funnel = data.funnel || {};
  } catch(e) { console.error(e); }
  showLoadingBar(false);
  renderPage();
}

/* ══════════════════════════════════════
   APPROVE / REJECT
══════════════════════════════════════ */
async function approveShop(shopId) {
  if (!confirm("이 사업장을 승인하시겠습니까?")) return;
  // 사업자번호 중복 최종 확인
  const shop = STATE.shops[shopId];
  const bn   = normBN(shop?.businessNumber);
  const dups = Object.entries(STATE.shops).filter(([sid, s]) =>
    sid !== shopId && normBN(s.businessNumber) === bn && s.approvalStatus === "approved"
  );
  if (dups.length > 0) {
    alert(`⚠️ 이미 승인된 동일 사업자번호 사업장이 있습니다.\n상호명: ${dups[0][1].name}\n중복 승인은 불가합니다.`);
    return;
  }
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`] = "approved";
  if (shop?.ownerId) updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "approved";
  await update(ref(db), updates);
  toast("✅ 사업장 승인 완료");
  loadAll();
}

async function rejectShop(shopId) {
  const reason = prompt("반려 사유를 입력하세요:\n(입력하지 않으면 '검토 기준 미달'로 처리됩니다)");
  if (reason === null) return;
  const finalReason = reason.trim() || "검토 기준 미달";
  const shop = STATE.shops[shopId];
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`] = "rejected";
  updates[`carwash-master/data/shops/${shopId}/rejectedReason`] = finalReason;
  if (shop?.ownerId) {
    updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "rejected";
    updates[`carwash-master/users/${shop.ownerId}/rejectedReason`] = finalReason;
  }
  await update(ref(db), updates);
  toast("❌ 사업장 반려 처리");
  loadAll();
}

async function approveCrew(shopId, crewId) {
  if (!confirm("이 직원을 승인하시겠습니까?")) return;
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "approved";
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "approved";
  await update(ref(db), updates);
  toast("✅ 직원 승인 완료");
  loadAll();
}

async function rejectCrew(shopId, crewId) {
  const reason = prompt("직원 반려 사유를 입력하세요:");
  if (reason === null) return;
  const finalReason = reason.trim() || "승인 기준 미달";
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/rejectedReason`] = finalReason;
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/users/${crewId}/rejectedReason`] = finalReason;
  await update(ref(db), updates);
  toast("❌ 직원 반려 처리");
  loadAll();
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function nav(page) {
  STATE.page = page;
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === page));
  renderPage();
}

function renderPage() {
  const main = document.getElementById("mainContent");
  switch(STATE.page) {
    case "dashboard": main.innerHTML = renderDashboard(); break;
    case "shops":     main.innerHTML = renderShops();     break;
    case "users":     main.innerHTML = renderUsers();     break;
    case "stats":     main.innerHTML = renderStats();     break;
  }
}

/* ── DASHBOARD ── */

  const shops   = Object.values(STATE.shops);
  const pending = shops.filter(s => s.approvalStatus === "pending");
  const approved= shops.filter(s => s.approvalStatus === "approved");

  // 중복 사업자번호 탐지
  const bnCount = {};
  shops.forEach(s => { const bn = normBN(s.businessNumber); if (bn) bnCount[bn] = (bnCount[bn]||0)+1; });

    Object.entries(shop.crews||{}).forEach(([crewId, crew]) => {
      if (crew.approvalStatus === "pending")
        crewPending.push({ ...crew, crewId, shopId: shop.id, shopName: shop.name });
    });

  return `
  <div class="page-header">
    <h1 class="page-title">대시보드</h1>
    <div class="page-subtitle">${todayStr()} 기준 운영 현황</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(37,99,235,.15)">🏪</div>
      <div class="kpi-body"><div class="kpi-num">${shops.length}</div><div class="kpi-label">전체 사업장</div></div>
      <div class="kpi-change positive">승인 ${approved.length}</div>
    </div>
    <div class="kpi-card ${pending.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(249,115,22,.15)">⏳</div>
      <div class="kpi-body"><div class="kpi-num">${pending.length}</div><div class="kpi-label">승인 대기</div></div>
      ${pending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card ${crewPending.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(124,58,237,.15)">👷</div>
      <div class="kpi-body"><div class="kpi-num">${crewPending.length}</div><div class="kpi-label">직원 승인 대기</div></div>
      ${crewPending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card ${dupBNs.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(239,68,68,.15)">⚠️</div>
      <div class="kpi-body"><div class="kpi-num">${dupBNs.length}</div><div class="kpi-label">사업자번호 중복</div></div>
      ${dupBNs.length>0?'<div class="kpi-change warn">확인 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
  </div>

  ${dupBNs.length>0?`
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">⚠️ 사업자번호 중복 감지 <span class="badge-alert">${dupBNs.length}</span></div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>사업자번호</th><th>중복 사업장</th><th>상태</th><th>등록일</th></tr></thead>
        <tbody>
          ${dupBNs.map(bn => {
            const matched = shops.filter(s=>normBN(s.businessNumber)===bn);
            return matched.map(s=>`
            <tr>
              <td><span class="font-mono text-warn fw-600">${esc(s.businessNumber)}</span></td>
              <td><span class="fw-600">${esc(s.name)}</span></td>
              <td><span class="status-badge ${statusCls(s.approvalStatus)}">${statusTxt(s.approvalStatus)}</span></td>
              <td class="text-dim">${fmtDate(s.createdAt)}</td>
            </tr>`).join("");
          }).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${pending.length>0?`
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">🔔 사업장 승인 대기 <span class="badge-alert">${pending.length}</span></div>
      <button class="btn-text" onclick="nav('shops')">전체 보기 →</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>상호명</th><th>사업자번호</th><th>주소</th><th>신청일</th><th>중복여부</th><th>액션</th></tr></thead>
        <tbody>
          ${pending.map(s => {
            const bn = normBN(s.businessNumber);
            const isDup = shops.some(o => o !== s && normBN(o.businessNumber) === bn && o.approvalStatus === "approved");
            return `<tr>
              <td><span class="fw-600">${esc(s.id)}</span><br><small class="text-dim">${esc(s.name)}</small></td>
              <td class="font-mono text-xs">${esc(s.businessNumber)}</td>
              <td class="text-dim text-xs">${esc(s.address)}</td>
              <td class="text-dim">${fmtDate(s.createdAt)}</td>
              <td>${isDup?'<span class="status-badge badge-rejected">⚠️ 중복</span>':'<span class="status-badge badge-approved">고유</span>'}</td>
              <td>
                <div class="action-btns">
                  <button class="btn-approve" onclick="approveShop('${getShopId(s)}')" ${isDup?'disabled title="이미 승인된 동일 사업자번호가 있습니다"':''}>승인</button>
                  <button class="btn-reject"  onclick="rejectShop('${getShopId(s)}')">반려</button>
                </div>

            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${crewPending.length>0?`
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">👷 직원 승인 대기 <span class="badge-alert">${crewPending.length}</span></div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>이름</th><th>소속 사업장</th><th>생년월일</th><th>차량 정보</th><th>신청일</th><th>액션</th></tr></thead>
        <tbody>
          ${crewPending.map(c=>`
          <tr>
            <td class="fw-600">${esc(c.name)}</td>
            <td class="text-dim">${esc(c.shopName)}</td>
            <td class="text-dim">${esc(c.birthDate||"-")}</td>
            <td class="text-dim">${esc(c.vehicleInfo||"-")}</td>
            <td class="text-dim">${fmtDate(c.createdAt)}</td>
            <td>
              <div class="action-btns">
                <button class="btn-approve" onclick="approveCrew('${c.shopId}','${c.crewId}')">승인</button>
                <button class="btn-reject"  onclick="rejectCrew('${c.shopId}','${c.crewId}')">반려</button>
              </div>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${pending.length===0&&crewPending.length===0&&dupBNs.length===0?`
  <div class="empty-state">
    <div class="empty-icon">✅</div>
    <div class="empty-title">모든 요청이 처리되었습니다</div>
    <div class="empty-sub">새 요청이 들어오면 이 화면에 표시됩니다</div>
  </div>`:""}
  `;
}

function getShopId(shopObj) {
  return Object.entries(STATE.shops).find(([,s])=>s===shopObj)?.[0] || shopObj.id || "";
}

/* ── SHOPS — 사업자번호 기준 고유 뷰 ── */
function renderShops() {
  const shops = Object.values(STATE.shops);
  // 사업자번호별 대표 샵 목록
  const bnGroups = {};
  shops.forEach(s => {
    const bn = normBN(s.businessNumber) || s.id;
    if (!bnGroups[bn]) bnGroups[bn] = [];
    bnGroups[bn].push(s);
  });

  return `
  <div class="page-header">
    <h1 class="page-title">사업장 관리</h1>
    <div class="page-subtitle">전체 ${shops.length}개 사업장 · 고유 사업자번호 ${Object.keys(bnGroups).length}개</div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterShops(this,'all')">전체 (${shops.length})</button>
    <button class="filter-btn" onclick="filterShops(this,'pending')">대기 (${shops.filter(s=>s.approvalStatus==='pending').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'approved')">승인 (${shops.filter(s=>s.approvalStatus==='approved').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'rejected')">반려 (${shops.filter(s=>s.approvalStatus==='rejected').length})</button>
  </div>
  <div class="shop-cards" id="shopCards">
    ${shops.length===0
      ? '<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">등록된 사업장이 없습니다</div></div>'
      : shops.map(s => renderShopCard(s, Object.entries(STATE.shops).find(([,v])=>v===s)?.[0]||s.id, bnGroups)).join("")}
  </div>`;
}

function renderShopCard(s, shopId, bnGroups) {
  const statusCl  = {pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s.approvalStatus]||"";
  const statusTx  = {pending:"⏳ 승인 대기",approved:"✅승인 완료",rejected:"❌ 반려"}[s.approvalStatus]||"";
  const crews     = Object.values(s.crews||{});
  const customers = Object.values(s.customers||{});
  const bn        = normBN(s.businessNumber);
  const bnGroup   = bnGroups?.[bn] || [];
  const isDup     = bnGroup.length > 1;

  return `
  <div class="shop-card" data-status="${s.approvalStatus}">
    <div class="shop-card-header">
      <div class="shop-card-info">
        <div class="shop-name">${esc(s.name)}
          ${isDup?'<span class="dup-badge">사업자번호 중복</span>':''}
        </div>
        <div class="shop-meta">${esc(s.address)}</div>
        <div class="shop-meta font-mono text-xs">
          사업자번호: <strong>${esc(s.businessNumber)}</strong>
          &nbsp;·&nbsp;코드: <span class="code-chip">${esc(shopId)}</span>
        </div>
      </div>
      <span class="status-badge ${statusCl}">${statusTx}</span>
    </div>

    <div class="shop-desc">${esc(s.description||"설명 없음")}</div>

    <div class="shop-stats">
      <div class="shop-stat"><span class="shop-stat-num">${customers.length}</span><span class="shop-stat-label">고객</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${crews.filter(c=>c.approvalStatus==='approved').length}</span><span class="shop-stat-label">직원</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${crews.filter(c=>c.approvalStatus==='pending').length}</span><span class="shop-stat-label">직원 대기</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${fmtDate(s.createdAt)}</span><span class="shop-stat-label">등록일</span></div>
    </div>

    ${s.approvalStatus==="pending"?`
    <div class="shop-card-actions">
      <button class="btn-approve" onclick="approveShop('${shopId}')"
        ${isDup&&shops_hasDupApproved(bn,shopId)?'disabled title="동일 사업자번호 승인 사업장 존재"':''}>
        ✅ 승인
      </button>
      <button class="btn-reject" onclick="rejectShop('${shopId}')">❌ 반려</button>
    </div>`:""}

    ${s.approvalStatus==="rejected"&&s.rejectedReason?`
    <div class="reject-reason">반려 사유: ${esc(s.rejectedReason)}</div>`:""}

    ${crews.filter(c=>c.approvalStatus==="pending").length>0?`
    <div class="crew-pending-block">
      <div class="crew-pending-title">직원 승인 대기</div>
      ${Object.entries(s.crews||{}).filter(([,c])=>c.approvalStatus==="pending").map(([cid,c])=>`
      <div class="crew-pending-row">
        <div><span class="fw-600">${esc(c.name)}</span><span class="text-dim text-xs"> · ${esc(c.vehicleInfo||"-")}</span></div>
        <div class="action-btns">
          <button class="btn-approve btn-sm" onclick="approveCrew('${shopId}','${cid}')">승인</button>
          <button class="btn-reject btn-sm"  onclick="rejectCrew('${shopId}','${cid}')">반려</button>
        </div>
      </div>`).join("")}
    </div>`:""}
  </div>`;
}

function shops_hasDupApproved(bn, excludeShopId) {
  return Object.entries(STATE.shops).some(([sid,s]) =>
    sid !== excludeShopId && normBN(s.businessNumber) === bn && s.approvalStatus === "approved"
  );
}

/* ── USERS ── */
function renderUsers() {
  const users  = Object.values(STATE.users);
  const owners = users.filter(u=>u.role==="owner");
  const crews  = users.filter(u=>u.role==="crew");
  return `
  <div class="page-header">
    <h1 class="page-title">유저 관리</h1>
    <div class="page-subtitle">사장 ${owners.length}명 · 직원 ${crews.length}명</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchUserTab(this,'owner')">사장 (${owners.length})</button>
    <button class="tab-btn"        onclick="switchUserTab(this,'crew')">직원 (${crews.length})</button>
  </div>
  <div id="userTableWrap">${renderUserTable(owners)}</div>`;
}

function renderUserTable(users) {
  if (!users.length) return '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">유저 없음</div></div>';
  return `
  <div class="table-wrap">
    <table class="data-table">
      <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>사업장 코드</th><th>상태</th><th>가입일</th></tr></thead>
      <tbody>
        ${users.map(u=>`
        <tr>
          <td class="fw-600">${esc(u.name||"-")}</td>
          <td class="text-dim font-mono text-xs">${esc(u.email||"-")}</td>
          <td><span class="role-badge ${u.role==='owner'?'role-owner':'role-crew'}">${u.role==='owner'?'사장':'직원'}</span></td>
          <td><span class="code-chip font-mono text-xs">${esc(u.shopId||"-")}</span></td>
          <td><span class="status-badge ${statusCls(u.approvalStatus)}">${statusTxt(u.approvalStatus)}</span></td>
          <td class="text-dim">${fmtDate(u.createdAt)}</td>
        </tr>`).join("")}
      </tbody>
    </table>
  </div>`;
}

/* ── STATS ── */
function renderStats() {
  const funnelData = STATE.stats.funnel;
  const events = {};
  Object.values(funnelData).forEach(day => {
    Object.entries(day.ios||{}).forEach(([evt,devs]) => {
      events[evt] = (events[evt]||0) + Object.keys(devs).length;
    });
  });
  const eventList = Object.entries(events).sort((a,b)=>b[1]-a[1]);
  return `
  <div class="page-header">
    <h1 class="page-title">앱 통계</h1>
    <div class="page-subtitle">세알 마스터 iOS 운영 지표</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(37,99,235,.15)">📲</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.installs}</div><div class="kpi-label">누적 설치</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(16,185,129,.15)">📅</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.dau}</div><div class="kpi-label">오늘 DAU</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(124,58,237,.15)">🎯</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.length}</div><div class="kpi-label">퍼널 이벤트 종류</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(249,115,22,.15)">🔥</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.reduce((s,[,v])=>s+v,0)}</div><div class="kpi-label">총 이벤트 수</div></div></div>
  </div>
  <div class="section-block">
    <div class="section-header"><div class="section-title">퍼널 이벤트 현황</div></div>
    ${eventList.length===0?'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">데이터 없음</div></div>':`
    <div class="funnel-list">
      ${(()=>{const mx=eventList[0]?.[1]||1;return eventList.map(([e,c])=>`
      <div class="funnel-row">
        <div class="funnel-label font-mono">${esc(e)}</div>
        <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(c/mx*100)}%"></div></div>
        <div class="funnel-count fw-600">${c}</div>
      </div>`).join("")})()}
    </div>`}
  </div>`;
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function todayStr() {
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDate(ts) {
  if(!ts)return"-";
  const d=new Date(ts>1e12?ts:ts*1000);
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}
function statusCls(s){return{pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s]||"";}
function statusTxt(s){return{pending:"⏳ 대기",approved:"✅ 승인",rejected:"❌ 반려"}[s]||s;}
function toast(msg) {
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},2800);
}
function showLoadingBar(on){document.getElementById("loadingBar").style.opacity=on?"1":"0";}
function showApp(user){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appShell").style.display="grid";
  const s=loadSession();
  const remaining=s?Math.max(0,Math.floor((s.exp-Date.now())/3600000)):0;
  document.getElementById("userEmail").textContent=user.email+` (${remaining}h 후 만료)`;
}
function showLogin(msg="") {
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("appShell").style.display="none";
  if(msg) document.getElementById("loginErr").textContent=msg;
}

/* ── 전역 바인딩 ── */
window.nav=nav; window.login=login; window.logout=logout;
window.approveShop=approveShop; window.rejectShop=rejectShop;
window.approveCrew=approveCrew; window.rejectCrew=rejectCrew;
window.refresh=loadAll;
window.filterShops=function(btn,status){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".shop-card").forEach(c=>{
    c.style.display=(status==="all"||c.dataset.status===status)?"":"none";
  });
};
window.switchUserTab=function(btn,role){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("userTableWrap").innerHTML=
    renderUserTable(Object.values(STATE.users).filter(u=>u.role===role));
};
</script>

.filter-btn:hover{border-color:var(--blue);color:var(--text)}
.filter-btn.active{background:var(--blue-dim);border-color:rgba(37,99,235,.5);color:var(--blue)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--stroke);margin-bottom:20px}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;
  padding:10px 20px;font-size:14px;font-weight:600;color:var(--text-sec);cursor:pointer;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.funnel-list{padding:16px 20px;display:grid;gap:12px}
.funnel-row{display:flex;align-items:center;gap:12px}
.funnel-label{font-size:12px;color:var(--text-sec);min-width:180px}
.funnel-bar-wrap{flex:1;background:var(--bg-hi);border-radius:999px;height:8px;overflow:hidden}
.funnel-bar{height:100%;background:var(--blue);border-radius:999px;transition:width .4s ease}
.funnel-count{font-size:13px;min-width:36px;text-align:right}
.empty-state{text-align:center;padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:44px}
.empty-title{font-size:16px;font-weight:700}
.empty-sub{font-size:13px;color:var(--text-sec)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--bg-card);border:1px solid var(--stroke);color:var(--text);
  padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .25s,transform .25s;z-index:9998}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  :root{--sidebar-w:60px}
  .nav-item span:not(.nav-icon){display:none}
  .nav-section-label{display:none}
  .main-content{padding:20px 16px 40px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .login-card{padding:32px 24px}
}
</style>
</head>
<body>

<div id="loadingBar"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">🚗</div>
      <div>
        <div class="login-brand-name">세알 콘솔</div>
        <div class="login-brand-sub">Seal Admin Console</div>
      </div>
    </div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">Firebase Authentication에 등록된<br>관리자 계정으로만 접속 가능합니다.</div>
    <div class="form-field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com"
             onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()"/>
    </div>
    <div class="form-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">로그인</button>
    <div class="login-err" id="loginErr"></div>
    <div class="session-info">🔒 로그인 후 24시간 동안 자동 로그인이 유지됩니다</div>
    <div class="login-note">Firebase Console → Authentication → Email/Password에서<br>수동으로 등록된 계정만 접속 가능합니다.</div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-mark">🚗</div>
      <div class="topbar-name">세알 콘솔</div>
      <div class="topbar-tag">ADMIN</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button class="topbar-refresh" onclick="refresh()">⟳ 새로고침</button>
      <button class="topbar-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <nav class="sidebar">
    <div class="nav-section-label">메인</div>
    <button class="nav-item active" data-page="dashboard" onclick="nav('dashboard')">
      <span class="nav-icon">📊</span><span>대시보드</span>
    </button>
    <div class="nav-section-label">관리</div>
    <button class="nav-item" data-page="shops" onclick="nav('shops')">
      <span class="nav-icon">🏪</span><span>사업장 관리</span>
    </button>
    <button class="nav-item" data-page="users" onclick="nav('users')">
      <span class="nav-icon">👤</span><span>유저 관리</span>
    </button>
    <div class="nav-section-label">분석</div>
    <button class="nav-item" data-page="stats" onclick="nav('stats')">
      <span class="nav-icon">📈</span><span>앱 통계</span>
    </button>
  </nav>
  <main class="main-content" id="mainContent"></main>
</div>

</body>
</html>
