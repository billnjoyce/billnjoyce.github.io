<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>세알 콘솔</title>

<script type="module">
import { initializeApp }                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged,
         setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey:            "AIzaSyAoUQNXqxHfS1JmpIOU-etlM57b2WEidio",
  authDomain:        "carwash-4699b.firebaseapp.com",
  databaseURL:       "https://carwash-4699b.firebaseio.com",
  projectId:         "carwash-4699b",
  storageBucket:     "carwash-4699b.appspot.com",
  messagingSenderId: "209684707726",
  appId:             "1:209684707726:ios:feabc8fc02d4dec8a48cdf"
});
const auth = getAuth(app);
const db   = getDatabase(app);

/* ══════════════════════════════════════
   24시간 세션 — localStorage 만료 시각으로 관리
══════════════════════════════════════ */
const EXP_KEY = "seal_login_exp";
const TTL_MS  = 24 * 60 * 60 * 1000;

function saveExp()       { localStorage.setItem(EXP_KEY, String(Date.now() + TTL_MS)); }
function clearExp()      { localStorage.removeItem(EXP_KEY); }
function isExpired()     { const v = localStorage.getItem(EXP_KEY); return !v || Date.now() > Number(v); }
function remainingHours(){ const v = localStorage.getItem(EXP_KEY); if(!v) return 0; return Math.max(0,Math.floor((Number(v)-Date.now())/3600000)); }

/* ── Firebase LOCAL persistence ── */
await setPersistence(auth, browserLocalPersistence);

/* ── justLoggedIn 플래그 (로그인 직후 만료 체크 skip) ── */
let justLoggedIn = false;

/* ══════════════════════════════════════
   핵심: 초기 상태는 무조건 "로딩" 화면
   onAuthStateChanged 결과가 나오면 그때 전환
══════════════════════════════════════ */
showLoading(); // ← 페이지 열리자마자 로딩 스크린 표시

onAuthStateChanged(auth, async user => {
  if (user) {
    if (justLoggedIn) {
      justLoggedIn = false;
      showApp(user);
      loadAll();
      return;
    }
    if (isExpired()) {
      await signOut(auth);
      clearExp();
      showLogin("세션이 만료되었습니다 (24시간). 다시 로그인해 주세요.");
      return;
    }
    // 로그인 유지 상태 → 바로 앱 표시 (로그인 화면 안 거침)
    showApp(user);
    loadAll();
  } else {
    clearExp();
    showLogin();
  }
});

/* ── 로그인 ── */
async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const btn   = document.getElementById("loginBtn");
  const err   = document.getElementById("loginErr");
  err.textContent = "";
  if (!email || !pw) { err.textContent = "이메일과 비밀번호를 입력해 주세요."; return; }
  btn.disabled = true; btn.textContent = "로그인 중...";
  try {
    justLoggedIn = true;
    saveExp();
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    justLoggedIn = false;
    clearExp();
    const known = ["auth/invalid-credential","auth/wrong-password","auth/user-not-found","auth/invalid-email"];
    err.textContent = known.includes(e.code) ? "이메일 또는 비밀번호가 올바르지 않습니다." : "로그인에 실패했습니다: " + e.message;
    btn.disabled = false; btn.textContent = "로그인";
  }
}

/* ── 로그아웃 ── */
function logout() {
  if (!confirm("로그아웃 하시겠습니까?")) return;
  clearExp();
  signOut(auth);
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let STATE = { page:"dashboard", shops:{}, users:{}, selectedShopId:null, stats:{installs:0,dau:0,funnel:{}} };

function normBN(bn) { return (bn||"").replace(/-/g,"").trim(); }

async function loadAll() {
  showLoadingBar(true);
  try {
    const snap = await get(ref(db,"carwash-master"));
    if (!snap.exists()) { showLoadingBar(false); renderPage(); return; }
    const data = snap.val();
    STATE.shops = data.data?.shops || {};
    STATE.users = data.users || {};
    // id 필드가 누락된 레코드 대비 — key를 id로 보강
    Object.entries(STATE.users).forEach(([uid, u]) => { if(!u.id) u.id = uid; });
    STATE.stats.installs = Object.keys(data.install?.ios||{}).length;
    const today = todayStr();
    let dau=0;
    Object.values(data.dau?.[today]?.ios||{}).forEach(v=>{dau+=Object.keys(v).length;});
    STATE.stats.dau=dau;
    STATE.stats.funnel=data.funnel||{};
  } catch(e){ console.error(e); }
  showLoadingBar(false);
  renderPage();
}

/* ══════════════════════════════════════
   APPROVE / REJECT
══════════════════════════════════════ */
async function approveShop(shopId) {
  if (!confirm("이 사업장을 승인하시겠습니까?")) return;
  const shop=STATE.shops[shopId];
  const bn=normBN(shop?.businessNumber);
  const dups=Object.entries(STATE.shops).filter(([sid,s])=>sid!==shopId&&normBN(s.businessNumber)===bn&&s.approvalStatus==="approved");
  if (dups.length>0){alert(`⚠️ 이미 승인된 동일 사업자번호 사업장이 있습니다.\n상호명: ${dups[0][1].name}`);return;}
  const u={};
  u[`carwash-master/data/shops/${shopId}/approvalStatus`]="approved";
  if(shop?.ownerId)u[`carwash-master/users/${shop.ownerId}/approvalStatus`]="approved";
  await update(ref(db),u);
  toast("✅ 사업장 승인 완료"); loadAll();
}
async function rejectShop(shopId) {
  const reason=prompt("반려 사유를 입력하세요:");
  if(reason===null)return;
  const r=reason.trim()||"검토 기준 미달";
  const shop=STATE.shops[shopId];
  const u={};
  u[`carwash-master/data/shops/${shopId}/approvalStatus`]="rejected";
  u[`carwash-master/data/shops/${shopId}/rejectedReason`]=r;
  if(shop?.ownerId){u[`carwash-master/users/${shop.ownerId}/approvalStatus`]="rejected";u[`carwash-master/users/${shop.ownerId}/rejectedReason`]=r;}
  await update(ref(db),u);
  toast("❌ 사업장 반려 처리"); loadAll();
}
async function approveCrew(shopId,crewId) {
  if(!confirm("이 직원을 승인하시겠습니까?"))return;
  const u={};
  u[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`]="approved";
  u[`carwash-master/users/${crewId}/approvalStatus`]="approved";
  await update(ref(db),u); toast("✅ 직원 승인 완료"); loadAll();
}
async function rejectCrew(shopId,crewId) {
  const reason=prompt("직원 반려 사유를 입력하세요:");
  if(reason===null)return;
  const r=reason.trim()||"승인 기준 미달";
  const u={};
  u[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`]="rejected";
  u[`carwash-master/data/shops/${shopId}/crews/${crewId}/rejectedReason`]=r;
  u[`carwash-master/users/${crewId}/approvalStatus`]="rejected";
  u[`carwash-master/users/${crewId}/rejectedReason`]=r;
  await update(ref(db),u); toast("❌ 직원 반려 처리"); loadAll();
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function nav(page){
  STATE.page=page;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.page===page));
  renderPage();
}
function renderPage(){
  const main=document.getElementById("mainContent");
  switch(STATE.page){
    case"dashboard":main.innerHTML=renderDashboard();break;
    case"shops":main.innerHTML=renderShops();break;
    case"shop-detail":main.innerHTML=renderShopDetail(STATE.selectedShopId);break;
    case"users":main.innerHTML=renderUsers();break;
    case"stats":main.innerHTML=renderStats();break;
  }
}
function openShopDetail(shopId){
  STATE.selectedShopId = shopId;
  STATE.page = 'shop-detail';
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.page==="shops"));
  renderPage();
}

function renderDashboard(){
  const shops=Object.entries(STATE.shops);
  const pending=shops.filter(([,s])=>s.approvalStatus==="pending");
  const approved=shops.filter(([,s])=>s.approvalStatus==="approved");
  const bnCount={};
  shops.forEach(([,s])=>{const bn=normBN(s.businessNumber);if(bn)bnCount[bn]=(bnCount[bn]||0)+1;});
  const dupBNs=Object.entries(bnCount).filter(([,c])=>c>1).map(([bn])=>bn);
  let crewPending=[];
  shops.forEach(([shopId,shop])=>{
    Object.entries(shop.crews||{}).forEach(([crewId,crew])=>{
      if(crew.approvalStatus==="pending")crewPending.push({...crew,crewId,shopId,shopName:shop.name});
    });
  });
  return`
  <div class="page-header"><h1 class="page-title">대시보드</h1><div class="page-subtitle">${todayStr()} 기준 운영 현황</div></div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(37,99,235,.15)">🏪</div>
      <div class="kpi-body"><div class="kpi-num">${shops.length}</div><div class="kpi-label">전체 사업장</div></div>
      <div class="kpi-change positive">승인 ${approved.length}</div></div>
    <div class="kpi-card ${pending.length>0?"alert":""}"><div class="kpi-icon" style="background:rgba(249,115,22,.15)">⏳</div>
      <div class="kpi-body"><div class="kpi-num">${pending.length}</div><div class="kpi-label">승인 대기</div></div>
      ${pending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}</div>
    <div class="kpi-card ${crewPending.length>0?"alert":""}"><div class="kpi-icon" style="background:rgba(124,58,237,.15)">👷</div>
      <div class="kpi-body"><div class="kpi-num">${crewPending.length}</div><div class="kpi-label">직원 승인 대기</div></div>
      ${crewPending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}</div>
    <div class="kpi-card ${dupBNs.length>0?"alert":""}"><div class="kpi-icon" style="background:rgba(239,68,68,.15)">⚠️</div>
      <div class="kpi-body"><div class="kpi-num">${dupBNs.length}</div><div class="kpi-label">사업자번호 중복</div></div>
      ${dupBNs.length>0?'<div class="kpi-change warn">확인 필요</div>':'<div class="kpi-change positive">없음</div>'}</div>
  </div>
  ${dupBNs.length>0?`<div class="section-block"><div class="section-header"><div class="section-title">⚠️ 사업자번호 중복 <span class="badge-alert">${dupBNs.length}</span></div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>사업자번호</th><th>상호명</th><th>상태</th><th>등록일</th></tr></thead><tbody>
  ${dupBNs.flatMap(bn=>shops.filter(([,s])=>normBN(s.businessNumber)===bn).map(([,s])=>`<tr><td class="font-mono fw-600 text-warn">${esc(s.businessNumber)}</td><td class="fw-600">${esc(s.name)}</td><td><span class="status-badge ${statusCls(s.approvalStatus)}">${statusTxt(s.approvalStatus)}</span></td><td class="text-dim">${fmtDate(s.createdAt)}</td></tr>`)).join("")}
  </tbody></table></div></div>`:""}
  ${pending.length>0?`<div class="section-block"><div class="section-header"><div class="section-title">🔔 사업장 승인 대기 <span class="badge-alert">${pending.length}</span></div><button class="btn-text" onclick="nav('shops')">전체 보기 →</button></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>상호명</th><th>사업자번호</th><th>주소</th><th>신청일</th><th>중복</th><th>액션</th></tr></thead><tbody>
  ${pending.map(([sid,s])=>{const bn=normBN(s.businessNumber);const isDup=shops.some(([osid,o])=>osid!==sid&&normBN(o.businessNumber)===bn&&o.approvalStatus==="approved");
  return`<tr><td class="fw-600">${esc(s.name)}</td><td class="font-mono text-xs">${esc(s.businessNumber)}</td><td class="text-dim text-xs">${esc(s.address)}</td><td class="text-dim">${fmtDate(s.createdAt)}</td>
  <td>${isDup?'<span class="status-badge badge-rejected">⚠️ 중복</span>':'<span class="status-badge badge-approved">고유</span>'}</td>
  <td><div class="action-btns"><button class="btn-approve" onclick="approveShop('${sid}')" ${isDup?"disabled":""}>승인</button><button class="btn-reject" onclick="rejectShop('${sid}')">반려</button></div></td></tr>`;}).join("")}
  </tbody></table></div></div>`:""}
  ${crewPending.length>0?`<div class="section-block"><div class="section-header"><div class="section-title">👷 직원 승인 대기 <span class="badge-alert">${crewPending.length}</span></div></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>이름</th><th>소속 사업장</th><th>생년월일</th><th>차량</th><th>신청일</th><th>액션</th></tr></thead><tbody>
  ${crewPending.map(c=>`<tr><td class="fw-600">${esc(c.name)}</td><td class="text-dim">${esc(c.shopName)}</td><td class="text-dim">${esc(c.birthDate||"-")}</td><td class="text-dim">${esc(c.vehicleInfo||"-")}</td><td class="text-dim">${fmtDate(c.createdAt)}</td>
  <td><div class="action-btns"><button class="btn-approve" onclick="approveCrew('${c.shopId}','${c.crewId}')">승인</button><button class="btn-reject" onclick="rejectCrew('${c.shopId}','${c.crewId}')">반려</button></div></td></tr>`).join("")}
  </tbody></table></div></div>`:""}
  ${pending.length===0&&crewPending.length===0&&dupBNs.length===0?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">모든 요청이 처리되었습니다</div><div class="empty-sub">새 요청이 들어오면 여기에 표시됩니다</div></div>`:""}`;
}

function renderShops(){
  const shops=Object.entries(STATE.shops);
  return`<div class="page-header"><h1 class="page-title">사업장 관리</h1><div class="page-subtitle">전체 ${shops.length}개</div></div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterShops(this,'all')">전체 (${shops.length})</button>
    <button class="filter-btn" onclick="filterShops(this,'pending')">대기 (${shops.filter(([,s])=>s.approvalStatus==='pending').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'approved')">승인 (${shops.filter(([,s])=>s.approvalStatus==='approved').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'rejected')">반려 (${shops.filter(([,s])=>s.approvalStatus==='rejected').length})</button>
  </div>
  <div class="shop-cards" id="shopCards">
  ${shops.length===0?'<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">등록된 사업장이 없습니다</div></div>'
    :shops.map(([sid,s])=>renderShopCard(sid,s,shops)).join("")}
  </div>`;
}
function renderShopCard(shopId,s,allShops){
  const scls={pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s.approvalStatus]||"";
  const stxt={pending:"⏳ 승인 대기",approved:"✅ 승인 완료",rejected:"❌ 반려"}[s.approvalStatus]||"";
  const crews=Object.entries(s.crews||{});
  const approvedCrews=crews.filter(([,c])=>c.approvalStatus==='approved');
  const customers=Object.entries(s.customers||{});
  const bn=normBN(s.businessNumber);
  const isDup=allShops.some(([osid,o])=>osid!==shopId&&normBN(o.businessNumber)===bn);
  const dupApproved=allShops.some(([osid,o])=>osid!==shopId&&normBN(o.businessNumber)===bn&&o.approvalStatus==="approved");
  const panelId = `shop-panel-${shopId}`;
  return`<div class="shop-card" data-status="${s.approvalStatus}">
  <div class="shop-card-header" onclick="openShopDetail('${shopId}')" style="cursor:pointer">
    <div class="shop-card-info">
    <div class="shop-name">${esc(s.name)}${isDup?'<span class="dup-badge">사업자번호 중복</span>':''}</div>
    <div class="shop-meta">${esc(s.address)}</div>
    <div class="shop-meta font-mono text-xs">사업자번호: <strong>${esc(s.businessNumber)}</strong> · 코드: <span class="code-chip">${esc(shopId)}</span></div>
  </div><span class="status-badge ${scls}">${stxt}</span></div>
  <div class="shop-desc">${esc(s.description||"설명 없음")}</div>
  <div class="shop-stats">
    <div class="shop-stat"><span class="shop-stat-num">${customers.length}</span><span class="shop-stat-label">고객</span></div>
    <div class="shop-stat"><span class="shop-stat-num">${approvedCrews.length}</span><span class="shop-stat-label">직원</span></div>
    <div class="shop-stat"><span class="shop-stat-num">${crews.filter(([,c])=>c.approvalStatus==='pending').length}</span><span class="shop-stat-label">직원 대기</span></div>
    <div class="shop-stat"><span class="shop-stat-num">${fmtDate(s.createdAt)}</span><span class="shop-stat-label">등록일</span></div>
  </div>
  ${s.approvalStatus==="pending"?`<div class="shop-card-actions">
    <button class="btn-approve" onclick="approveShop('${shopId}')" ${dupApproved?"disabled":""}>✅ 승인</button>
    <button class="btn-reject" onclick="rejectShop('${shopId}')">❌ 반려</button>
  </div>`:""}
  ${s.approvalStatus==="rejected"&&s.rejectedReason?`<div class="reject-reason">반려 사유: ${esc(s.rejectedReason)}</div>`:""}
  ${crews.filter(([,c])=>c.approvalStatus==="pending").length>0?`<div class="crew-pending-block">
    <div class="crew-pending-title">직원 승인 대기</div>
    ${crews.filter(([,c])=>c.approvalStatus==="pending").map(([cid,c])=>`
    <div class="crew-pending-row">
      <div><span class="fw-600">${esc(c.name)}</span><span class="text-dim text-xs"> · ${esc(c.vehicleInfo||"-")}</span></div>
      <div class="action-btns"><button class="btn-approve btn-sm" onclick="approveCrew('${shopId}','${cid}')">승인</button><button class="btn-reject btn-sm" onclick="rejectCrew('${shopId}','${cid}')">반려</button></div>
    </div>`).join("")}
  </div>`:""}

  <div class="shop-toggle-row">
    <button class="btn-text-sm" onclick="openShopDetail('${shopId}')">📋 고객 · 직원 상세 보기</button>
  </div>
  </div>`;
}

/* 사업장 카드 내 직원/고객 리스트 토글 */
function toggleShopPanel(panelId, kind, shopId){
  const panel = document.getElementById(panelId);
  if(!panel) return;
  const isOpen = panel.style.display !== 'none' && panel.dataset.kind === kind;
  if(isOpen){ panel.style.display='none'; return; }
  panel.dataset.kind = kind;
  panel.style.display='block';
  const shop = STATE.shops[shopId];
  if(kind==='crews'){
    const crews = Object.entries(shop.crews||{}).filter(([,c])=>c.approvalStatus==='approved');
    panel.innerHTML = crews.length===0
      ? '<div class="text-dim text-xs" style="padding:10px 0">승인된 직원이 없습니다.</div>'
      : crews.map(([cid,c])=>`
        <div class="mini-list-row" onclick="showCrewDetail('${shopId}','${cid}')">
          <div class="mini-list-avatar">${esc((c.name||'?').charAt(0))}</div>
          <div class="mini-list-body">
            <div class="fw-600 text-sm">${esc(c.name||'-')}</div>
            <div class="text-dim text-xs">${esc(c.phone||'전화번호 없음')} · ${esc(c.vehicleInfo||'차량 미등록')}</div>
          </div>
          <div class="text-dim text-xs">▸</div>
        </div>`).join("");
  } else {
    const customers = Object.entries(shop.customers||{});
    panel.innerHTML = customers.length===0
      ? '<div class="text-dim text-xs" style="padding:10px 0">등록된 고객이 없습니다.</div>'
      : customers.map(([cuid,c])=>`
        <div class="mini-list-row" onclick="showCustomerDetail('${shopId}','${cuid}')">
          <div class="mini-list-avatar">${esc((c.name||'?').charAt(0))}</div>
          <div class="mini-list-body">
            <div class="fw-600 text-sm">${esc(c.name||'-')}</div>
            <div class="text-dim text-xs">${esc(c.vehicleNumber||'-')} · ${esc(c.phone||'-')}</div>
          </div>
          <div class="text-dim text-xs">▸</div>
        </div>`).join("");
  }
}

async function saveCrewEdit(shopId, cid){
  const phone = document.getElementById(`edit-phone-${cid}`).value.trim();
  const hire = document.getElementById(`edit-hire-${cid}`).value.trim();
  const vehicle = document.getElementById(`edit-vehicle-${cid}`).value.trim();
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${cid}/phone`] = phone || null;
  updates[`carwash-master/data/shops/${shopId}/crews/${cid}/hireDate`] = hire || null;
  updates[`carwash-master/data/shops/${shopId}/crews/${cid}/vehicleInfo`] = vehicle || null;
  // users 노드의 동일 필드도 함께 동기화
  updates[`carwash-master/users/${cid}/phone`] = phone || null;
  updates[`carwash-master/users/${cid}/hireDate`] = hire || null;
  updates[`carwash-master/users/${cid}/vehicleInfo`] = vehicle || null;
  await update(ref(db), updates);
  toast('✅ 직원 정보 저장 완료');
  closeUserDetail();
  loadAll();
}

function switchShopDetailTab(btn, kind, shopId){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  const s = STATE.shops[shopId];
  const wrap = document.getElementById('shopDetailTableWrap');
  if(kind==='crews'){
    wrap.innerHTML = renderShopCrewTable(shopId, Object.entries(s.crews||{}));
  } else {
    wrap.innerHTML = renderShopCustomerTable(shopId, Object.entries(s.customers||{}));
  }
}

function renderShopCrewTable(shopId, crews){
  if(!crews.length) return '<div class="empty-state"><div class="empty-icon">👷</div><div class="empty-title">등록된 직원이 없습니다</div></div>';

  const order = {pending:0, approved:1, rejected:2};
  const sorted = [...crews].sort((a,b)=>(order[a[1].approvalStatus]??9)-(order[b[1].approvalStatus]??9));
  return `<div class="table-wrap"><table class="data-table"><thead><tr>
    <th>이름</th><th>전화번호</th><th>입사일</th><th>작업 차량</th><th>급여 유형</th><th>상태</th><th>가입일</th><th>액션</th>

    <td class="fw-600">${esc(c.name||'-')}</td>
    <td class="font-mono text-xs">${esc(c.phone||'-')}</td>
    <td class="text-dim text-xs">${esc(c.hireDate||'-')}</td>

    <td><span class="status-badge ${statusCls(c.approvalStatus)}">${statusTxt(c.approvalStatus)}</span></td>
    <td class="text-dim text-xs">${fmtDate(c.createdAt)}</td>
    <td onclick="event.stopPropagation()">
      ${c.approvalStatus==='pending'?`<div class="action-btns">
        <button class="btn-approve btn-sm" onclick="approveCrew('${shopId}','${cid}')">승인</button>

      </div>`:'<span class="text-dim text-xs">-</span>'}
    </td>
  </tr>`).join("")}
  </tbody></table></div>`;
}

/* ── 유저 승인/반려 (사장/직원 공통 처리) ── */
async function approveUser(uid){
  const u = STATE.users[uid];
  if(!u || !confirm(`${u.name}님을 승인하시겠습니까?`)) return;
  const updates = {};
  updates[`carwash-master/users/${uid}/approvalStatus`] = 'approved';
  if(u.role==='owner' && u.shopId){
    updates[`carwash-master/data/shops/${u.shopId}/approvalStatus`] = 'approved';
  } else if(u.role==='crew' && u.shopId){
    updates[`carwash-master/data/shops/${u.shopId}/crews/${uid}/approvalStatus`] = 'approved';
  }
  await update(ref(db), updates);
  toast('✅ 승인 완료');
  closeUserDetail();
  loadAll();
}
async function rejectUser(uid){
  const u = STATE.users[uid];
  if(!u) return;
  const reason = prompt('반려 사유를 입력하세요:');
  if(reason===null) return;
  const finalReason = reason.trim() || '검토 기준 미달';
  const updates = {};
  updates[`carwash-master/users/${uid}/approvalStatus`] = 'rejected';
  updates[`carwash-master/users/${uid}/rejectedReason`] = finalReason;
  if(u.role==='owner' && u.shopId){
    updates[`carwash-master/data/shops/${u.shopId}/approvalStatus`] = 'rejected';
    updates[`carwash-master/data/shops/${u.shopId}/rejectedReason`] = finalReason;
  } else if(u.role==='crew' && u.shopId){
    updates[`carwash-master/data/shops/${u.shopId}/crews/${uid}/approvalStatus`] = 'rejected';
    updates[`carwash-master/data/shops/${u.shopId}/crews/${uid}/rejectedReason`] = finalReason;
  }
  await update(ref(db), updates);
  toast('❌ 반려 처리');
  closeUserDetail();
  loadAll();
}

function renderStats(){
  const events={};
  Object.values(STATE.stats.funnel).forEach(day=>{Object.entries(day.ios||{}).forEach(([evt,devs])=>{events[evt]=(events[evt]||0)+Object.keys(devs).length;});});
  const el=Object.entries(events).sort((a,b)=>b[1]-a[1]);
  return`<div class="page-header"><h1 class="page-title">앱 통계</h1><div class="page-subtitle">세알 마스터 iOS 운영 지표</div></div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(37,99,235,.15)">📲</div><div class="kpi-body"><div class="kpi-num">${STATE.stats.installs}</div><div class="kpi-label">누적 설치</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(16,185,129,.15)">📅</div><div class="kpi-body"><div class="kpi-num">${STATE.stats.dau}</div><div class="kpi-label">오늘 DAU</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(124,58,237,.15)">🎯</div><div class="kpi-body"><div class="kpi-num">${el.length}</div><div class="kpi-label">이벤트 종류</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(249,115,22,.15)">🔥</div><div class="kpi-body"><div class="kpi-num">${el.reduce((s,[,v])=>s+v,0)}</div><div class="kpi-label">총 이벤트</div></div></div>
  </div>
  <div class="section-block"><div class="section-header"><div class="section-title">퍼널 이벤트 현황</div></div>
  ${el.length===0?'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">데이터 없음</div></div>':`<div class="funnel-list">
  ${(()=>{const mx=el[0]?.[1]||1;return el.map(([e,c])=>`<div class="funnel-row"><div class="funnel-label font-mono">${esc(e)}</div><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(c/mx*100)}%"></div></div><div class="funnel-count fw-600">${c}</div></div>`).join("")})()}
  </div>`}</div>`;
}

/* ── 기타 유틸 ── */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtDate(ts){if(!ts)return"-";const d=new Date(ts>1e12?ts:ts*1000);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;}
function statusCls(s){return{pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s]||"";}
function statusTxt(s){return{pending:"⏳ 대기",approved:"✅ 승인",rejected:"❌ 반려"}[s]||s;}

/* ── 앱 모델과 동일한 표시 텍스트 매핑 ── */
const CYCLE_TXT={weekly:'매주',biweekly:'격주',monthly:'매월 1회',other:'기타'};
const VCLASS_TXT={sedan:'세단',suv:'SUV',rv:'RV',van:'승합',sports:'스포츠카·컨버터블',luxury:'럭셔리카'};
const VSIZE_TXT={mini:'경차',compact:'소형',semiMid:'준중형',mid:'중형',large:'대형'};
const TIMESLOT_TXT={
  morning_9_12:'오전 9시 ~ 오후 12시', afternoon_1_5:'오후 1시 ~ 오후 5시',
  evening_9_1:'오후 9시 ~ 새벽 1시', night_8_10:'오후 8시 ~ 오후 10시',
  night_11_end:'오후 11시 ~ 새벽 중 종료'
};
const WEEKDAY_TXT={1:'월',2:'화',3:'수',4:'목',5:'금',6:'토',7:'일'};
const PAYTYPE_TXT={fullTime:'정직원 (월급제)',contract:'계약직 (건당)'};
function weekDaysTxt(days){
  if(!days) return '-';
  const arr = Array.isArray(days) ? days : Object.values(days);
  return arr.map(d=>WEEKDAY_TXT[d]||d).join('·') || '-';
}
function krw(n){ return (n||n===0) ? Number(n).toLocaleString('ko-KR')+'원' : '-'; }
function toast(msg){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},2800);
}
function showLoadingBar(on){document.getElementById("loadingBar").style.opacity=on?"1":"0";}

.role-crew{background:rgba(124,58,237,.12);color:var(--purple)}
.code-chip{display:inline-block;background:var(--bg-hi);color:var(--blue);border:1px solid var(--stroke);border-radius:6px;padding:2px 8px;font-size:11px}
.dup-badge{display:inline-block;background:var(--orange-bg);color:var(--orange);border:1px solid rgba(249,115,22,.3);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;margin-left:8px;vertical-align:middle}
.shop-cards{display:grid;gap:16px}
.shop-card{background:var(--bg-card);border:1px solid var(--stroke);border-radius:var(--r-lg);overflow:hidden;transition:border-color .15s}
.shop-card:hover{border-color:var(--stroke-hi)}
.shop-card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 20px 14px;gap:16px}
.shop-name{font-size:17px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.shop-meta{font-size:12px;color:var(--text-sec);margin-bottom:3px}
.shop-desc{padding:0 20px 14px;font-size:13px;color:var(--text-sec);line-height:1.6;border-bottom:1px solid var(--stroke);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.shop-stats{display:flex;border-bottom:1px solid var(--stroke)}
.shop-stat{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--stroke)}
.shop-stat:last-child{border-right:none}
.shop-stat-num{display:block;font-size:18px;font-weight:800;letter-spacing:-.03em}
.shop-stat-label{display:block;font-size:11px;color:var(--text-dim);margin-top:2px}
.shop-card-actions{padding:14px 20px;display:flex;gap:10px;border-bottom:1px solid var(--stroke)}
.shop-card-actions .btn-approve,.shop-card-actions .btn-reject{flex:1;padding:9px;font-size:13px;border-radius:10px}
.reject-reason{padding:10px 20px;font-size:12px;color:var(--red);background:var(--red-bg);border-top:1px solid rgba(239,68,68,.2)}
.crew-pending-block{padding:14px 20px}
.crew-pending-title{font-size:12px;font-weight:700;color:var(--orange);margin-bottom:10px}
.crew-pending-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:6px;background:var(--bg-hi);border:1px solid var(--stroke);border-radius:8px;gap:10px}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:var(--bg-card);border:1px solid var(--stroke);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--text-sec);transition:all .15s}
.filter-btn:hover{border-color:var(--blue);color:var(--text)}
.filter-btn.active{background:var(--blue-dim);border-color:rgba(37,99,235,.5);color:var(--blue)}
.tabs{display:inline-flex;gap:4px;background:var(--bg-hi);border:1px solid var(--stroke);
  border-radius:12px;padding:4px;margin-bottom:20px}
.tab-btn{background:none;border:none;border-radius:9px;padding:9px 18px;font-size:13px;
  font-weight:700;color:var(--text-sec);cursor:pointer;transition:all .18s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:#fff;background:var(--blue);box-shadow:0 2px 10px rgba(37,99,235,.4)}
.funnel-list{padding:16px 20px;display:grid;gap:12px}
.funnel-row{display:flex;align-items:center;gap:12px}
.funnel-label{font-size:12px;color:var(--text-sec);min-width:180px}
.funnel-bar-wrap{flex:1;background:var(--bg-hi);border-radius:999px;height:8px;overflow:hidden}
.funnel-bar{height:100%;background:var(--blue);border-radius:999px;transition:width .4s ease}
.funnel-count{font-size:13px;min-width:36px;text-align:right}
.empty-state{text-align:center;padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:44px}.empty-title{font-size:16px;font-weight:700}.empty-sub{font-size:13px;color:var(--text-sec)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--bg-card);border:1px solid var(--stroke);color:var(--text);padding:12px 24px;border-radius:999px;
  font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .25s,transform .25s;z-index:9998}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  :root{--sidebar-w:60px}
  .nav-item span:not(.nav-icon){display:none}
  .nav-section-label{display:none}
  .main-content{padding:20px 16px 40px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .login-card{padding:32px 24px}
}

/* 유저 상세 모달 */
.user-row:hover td{background:var(--bg-hi)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
.modal-card{position:relative;background:var(--bg-card);border:1px solid var(--stroke);
  border-radius:var(--r-xl);width:100%;max-width:460px;max-height:85vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.6);z-index:1}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 20px 14px;border-bottom:1px solid var(--stroke)}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.modal-sub{font-size:12px;color:var(--text-sec);margin-top:3px;font-family:'SF Mono',monospace}
.modal-close{background:var(--bg-hi);border:1px solid var(--stroke);border-radius:8px;
  width:28px;height:28px;color:var(--text-sec);font-size:13px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 20px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text-dim);
  letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px}
.detail-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--stroke);font-size:13px;gap:12px}
.detail-row:last-child{border-bottom:none}
.detail-row span:first-child{color:var(--text-sec);flex-shrink:0}
.detail-row strong{color:var(--text);font-weight:600;text-align:right}
.modal-footer{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--stroke)}
.shop-toggle-row{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--stroke)}
.btn-text-sm{background:var(--bg-hi);border:1px solid var(--stroke);border-radius:8px;
  padding:7px 12px;font-size:12px;font-weight:600;color:var(--text-sec)}
.btn-text-sm:hover{color:var(--text);border-color:var(--text-dim)}
.shop-list-panel{margin-top:10px;max-height:280px;overflow-y:auto;
  border-top:1px solid var(--stroke);padding-top:8px}
.mini-list-row{display:flex;align-items:center;gap:10px;padding:9px 4px;
  border-radius:8px;cursor:pointer}
.mini-list-row:hover{background:var(--bg-hi)}
.mini-list-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);
  color:var(--blue);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0}
.mini-list-body{flex:1;min-width:0}
.edit-field{margin:10px 0}
.edit-field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:600}
.edit-field input{width:100%;background:var(--bg-hi);border:1px solid var(--stroke);
  border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit}
.edit-field input:focus{outline:none;border-color:var(--blue)}
.btn-save-sm{width:100%;margin-top:8px;background:var(--blue);color:#fff;border:none;
  border-radius:8px;padding:10px;font-size:13px;font-weight:700}
.btn-save-sm:hover{opacity:.9}
.btn-back{background:none;border:none;color:var(--text-sec);font-size:13px;font-weight:600;
  margin-bottom:14px;padding:0;display:flex;align-items:center;gap:4px}
.btn-back:hover{color:var(--text)}
.raw-json{background:var(--bg-hi);border:1px solid var(--stroke);border-radius:8px;
  padding:12px;font-size:11px;line-height:1.6;color:var(--text-dim);
  white-space:pre-wrap;word-break:break-all;max-height:240px;overflow-y:auto;
  font-family:'SF Mono',Menlo,monospace}
</style>
</head>
<body>

<div id="loadingBar"></div>

<!-- 1. 초기 로딩 스크린 (기본 표시) -->
<div id="loadingScreen">
  <div class="loading-inner">
    <div class="loading-mark">🚗</div>
    <div class="loading-title">세알 콘솔</div>
    <div class="loading-sub">로그인 상태를 확인하는 중...</div>
    <div class="loading-spinner"></div>
  </div>
</div>

<!-- 2. 로그인 화면 (onAuthStateChanged 결과 후 표시) -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">🚗</div>
      <div>
        <div class="login-brand-name">세알 콘솔</div>
        <div class="login-brand-sub">Seal Admin Console</div>
      </div>
    </div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">Firebase Authentication에 등록된<br>관리자 계정으로만 접속 가능합니다.</div>
    <div class="form-field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com"
             onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()"/>
    </div>
    <div class="form-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">로그인</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-note">🔒 로그인 후 24시간 자동 유지 · 만료 시 재로그인 필요</div>
  </div>
</div>

<!-- 3. 앱 메인 -->
<div id="appShell">
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-mark">🚗</div>
      <div class="topbar-name">세알 콘솔</div>
      <div class="topbar-tag">ADMIN</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <span id="userEmail"></span>
      <button class="topbar-refresh" onclick="refresh()">⟳ 새로고침</button>
      <button class="topbar-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <nav class="sidebar">
    <div class="nav-section-label">메인</div>
    <button class="nav-item active" data-page="dashboard" onclick="nav('dashboard')"><span class="nav-icon">📊</span><span>대시보드</span></button>
    <div class="nav-section-label">관리</div>
    <button class="nav-item" data-page="shops" onclick="nav('shops')"><span class="nav-icon">🏪</span><span>사업장 관리</span></button>
    <button class="nav-item" data-page="users" onclick="nav('users')"><span class="nav-icon">👤</span><span>유저 관리</span></button>
    <div class="nav-section-label">분석</div>
    <button class="nav-item" data-page="stats" onclick="nav('stats')"><span class="nav-icon">📈</span><span>앱 통계</span></button>
  </nav>
  <main class="main-content" id="mainContent"></main>
</div>

<div id="userDetailModal" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;padding:20px;"></div>

</body>
</html>
