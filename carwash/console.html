<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>세알 콘솔</title>

<script type="module">
import { initializeApp }                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged,
         setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ── Firebase 설정 ── */
const app = initializeApp({
  apiKey:            "AIzaSyAoUQNXqxHfS1JmpIOU-etlM57b2WEidio",
  authDomain:        "carwash-4699b.firebaseapp.com",
  databaseURL:       "https://carwash-4699b.firebaseio.com",
  projectId:         "carwash-4699b",
  storageBucket:     "carwash-4699b.appspot.com",
  messagingSenderId: "209684707726",
  appId:             "1:209684707726:ios:feabc8fc02d4dec8a48cdf"
});
const auth = getAuth(app);
const db   = getDatabase(app);

/* ══════════════════════════════════════
   24시간 세션 관리
   ─ Firebase Auth persistence: LOCAL (탭/브라우저 닫아도 유지)
   ─ 별도 만료 시각을 localStorage에 저장
   ─ onAuthStateChanged는 "이미 로그인된 복원" 시에만 만료 체크
   ─ 로그인 직후에는 절대 만료 체크 안 함 (타이밍 버그 방지)
══════════════════════════════════════ */
const EXP_KEY = "seal_login_exp";
const TTL_MS  = 24 * 60 * 60 * 1000; // 24시간

function saveExp() {
  localStorage.setItem(EXP_KEY, String(Date.now() + TTL_MS));
}
function clearExp() {
  localStorage.removeItem(EXP_KEY);
}
function isExpired() {
  const v = localStorage.getItem(EXP_KEY);
  if (!v) return true;           // 만료 기록 없음 → 만료로 처리
  return Date.now() > Number(v);
}
function remainingHours() {
  const v = localStorage.getItem(EXP_KEY);
  if (!v) return 0;
  return Math.max(0, Math.floor((Number(v) - Date.now()) / 3600000));
}

/* Firebase Auth 자체를 LOCAL persistence로 설정
   → 브라우저 재시작해도 토큰 유지 */
await setPersistence(auth, browserLocalPersistence);

/* ── 플래그: 방금 로그인한 경우 onAuthStateChanged에서 만료 체크 skip ── */
let justLoggedIn = false;

onAuthStateChanged(auth, async user => {
  if (user) {
    if (justLoggedIn) {
      // 방금 로그인 → 만료 체크 skip, 바로 앱 표시
      justLoggedIn = false;
      showApp(user);
      loadAll();
      return;
    }
    // 페이지 새로고침/재방문 시 → 만료 여부 확인
    if (isExpired()) {
      await signOut(auth);
      clearExp();
      showLogin("세션이 만료되었습니다 (24시간). 다시 로그인해 주세요.");
      return;
    }
    showApp(user);
    loadAll();
  } else {
    clearExp();
    showLogin();
  }
});

/* ── 로그인 ── */
async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const btn   = document.getElementById("loginBtn");
  const err   = document.getElementById("loginErr");
  err.textContent = "";

  if (!email || !pw) {
    err.textContent = "이메일과 비밀번호를 입력해 주세요."; return;
  }
  btn.disabled = true; btn.textContent = "로그인 중...";

  try {
    justLoggedIn = true;      // ← 플래그 먼저 세팅
    saveExp();                // ← 만료 시각 먼저 저장
    await signInWithEmailAndPassword(auth, email, pw);
    // onAuthStateChanged가 justLoggedIn=true를 보고 만료 체크 skip
  } catch(e) {
    justLoggedIn = false;
    clearExp();
    const known = ["auth/invalid-credential","auth/wrong-password",
                   "auth/user-not-found","auth/invalid-email"];
    err.textContent = known.includes(e.code)
      ? "이메일 또는 비밀번호가 올바르지 않습니다."
      : "로그인에 실패했습니다: " + e.message;
    btn.disabled = false; btn.textContent = "로그인";
  }
}

/* ── 로그아웃 ── */
function logout() {
  if (!confirm("로그아웃 하시겠습니까?")) return;
  clearExp();
  signOut(auth);
}

/* ══════════════════════════════════════
   GLOBAL STATE
══════════════════════════════════════ */
let STATE = {
  page: "dashboard",
  shops: {},
  users: {},
  stats: { installs: 0, dau: 0, funnel: {} }
};

/* ══════════════════════════════════════
   DATA LOAD
══════════════════════════════════════ */
function normBN(bn) { return (bn||"").replace(/-/g,"").trim(); }

async function loadAll() {
  showLoadingBar(true);
  try {
    const snap = await get(ref(db, "carwash-master"));
    if (!snap.exists()) { showLoadingBar(false); renderPage(); return; }
    const data = snap.val();
    STATE.shops = data.data?.shops || {};
    STATE.users = data.users || {};
    STATE.stats.installs = Object.keys(data.install?.ios || {}).length;
    const today = todayStr();
    let dau = 0;
    Object.values(data.dau?.[today]?.ios || {}).forEach(v => { dau += Object.keys(v).length; });
    STATE.stats.dau = dau;
    STATE.stats.funnel = data.funnel || {};
  } catch(e) { console.error("loadAll error:", e); }
  showLoadingBar(false);
  renderPage();
}

/* ══════════════════════════════════════
   APPROVE / REJECT
══════════════════════════════════════ */
async function approveShop(shopId) {
  if (!confirm("이 사업장을 승인하시겠습니까?")) return;
  const shop = STATE.shops[shopId];
  const bn   = normBN(shop?.businessNumber);
  const dups = Object.entries(STATE.shops).filter(([sid, s]) =>
    sid !== shopId && normBN(s.businessNumber) === bn && s.approvalStatus === "approved"
  );
  if (dups.length > 0) {
    alert(`⚠️ 이미 승인된 동일 사업자번호 사업장이 있습니다.\n상호명: ${dups[0][1].name}\n중복 승인 불가합니다.`);
    return;
  }
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`] = "approved";
  if (shop?.ownerId) updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "approved";
  await update(ref(db), updates);
  toast("✅ 사업장 승인 완료");
  loadAll();
}

async function rejectShop(shopId) {
  const reason = prompt("반려 사유를 입력하세요:\n(비우면 '검토 기준 미달'로 처리됩니다)");
  if (reason === null) return;
  const finalReason = reason.trim() || "검토 기준 미달";
  const shop = STATE.shops[shopId];
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`]  = "rejected";
  updates[`carwash-master/data/shops/${shopId}/rejectedReason`]  = finalReason;
  if (shop?.ownerId) {
    updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "rejected";
    updates[`carwash-master/users/${shop.ownerId}/rejectedReason`] = finalReason;
  }
  await update(ref(db), updates);
  toast("❌ 사업장 반려 처리");
  loadAll();
}

async function approveCrew(shopId, crewId) {
  if (!confirm("이 직원을 승인하시겠습니까?")) return;
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "approved";
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "approved";
  await update(ref(db), updates);
  toast("✅ 직원 승인 완료");
  loadAll();
}

async function rejectCrew(shopId, crewId) {
  const reason = prompt("직원 반려 사유를 입력하세요:");
  if (reason === null) return;
  const finalReason = reason.trim() || "승인 기준 미달";
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/rejectedReason`] = finalReason;
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/users/${crewId}/rejectedReason`] = finalReason;
  await update(ref(db), updates);
  toast("❌ 직원 반려 처리");
  loadAll();
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function nav(page) {
  STATE.page = page;
  document.querySelectorAll(".nav-item").forEach(el =>
    el.classList.toggle("active", el.dataset.page === page));
  renderPage();
}

function renderPage() {
  const main = document.getElementById("mainContent");
  switch(STATE.page) {
    case "dashboard": main.innerHTML = renderDashboard(); break;
    case "shops":     main.innerHTML = renderShops();     break;
    case "users":     main.innerHTML = renderUsers();     break;
    case "stats":     main.innerHTML = renderStats();     break;
  }
}

/* ── DASHBOARD ── */

  const approved= shops.filter(([,s]) => s.approvalStatus === "approved");

  // 사업자번호 중복 탐지
  const bnCount = {};
  shops.forEach(([,s]) => { const bn = normBN(s.businessNumber); if(bn) bnCount[bn]=(bnCount[bn]||0)+1; });

  // 직원 승인 대기
  let crewPending = [];
  shops.forEach(([shopId, shop]) => {
    Object.entries(shop.crews||{}).forEach(([crewId, crew]) => {
      if (crew.approvalStatus === "pending")
        crewPending.push({ ...crew, crewId, shopId, shopName: shop.name });
    });
  });

  return `
  <div class="page-header">
    <h1 class="page-title">대시보드</h1>
    <div class="page-subtitle">${todayStr()} 기준 운영 현황</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(37,99,235,.15)">🏪</div>
      <div class="kpi-body"><div class="kpi-num">${shops.length}</div><div class="kpi-label">전체 사업장</div></div>
      <div class="kpi-change positive">승인 ${approved.length}</div>
    </div>
    <div class="kpi-card ${pending.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(249,115,22,.15)">⏳</div>
      <div class="kpi-body"><div class="kpi-num">${pending.length}</div><div class="kpi-label">승인 대기</div></div>
      ${pending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card ${crewPending.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(124,58,237,.15)">👷</div>
      <div class="kpi-body"><div class="kpi-num">${crewPending.length}</div><div class="kpi-label">직원 승인 대기</div></div>
      ${crewPending.length>0?'<div class="kpi-change warn">검토 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card ${dupBNs.length>0?'alert':''}">
      <div class="kpi-icon" style="background:rgba(239,68,68,.15)">⚠️</div>
      <div class="kpi-body"><div class="kpi-num">${dupBNs.length}</div><div class="kpi-label">사업자번호 중복</div></div>
      ${dupBNs.length>0?'<div class="kpi-change warn">확인 필요</div>':'<div class="kpi-change positive">없음</div>'}
    </div>
  </div>

  ${dupBNs.length>0?`
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">⚠️ 사업자번호 중복 감지 <span class="badge-alert">${dupBNs.length}</span></div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>사업자번호</th><th>상호명</th><th>상태</th><th>등록일</th></tr></thead>
        <tbody>
          ${dupBNs.flatMap(bn =>
            shops.filter(([,s])=>normBN(s.businessNumber)===bn).map(([sid,s])=>`
            <tr>
              <td class="font-mono fw-600 text-warn">${esc(s.businessNumber)}</td>
              <td class="fw-600">${esc(s.name)}</td>
              <td><span class="status-badge ${statusCls(s.approvalStatus)}">${statusTxt(s.approvalStatus)}</span></td>
              <td class="text-dim">${fmtDate(s.createdAt)}</td>
            </tr>`)
          ).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${pending.length>0?`
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">🔔 사업장 승인 대기 <span class="badge-alert">${pending.length}</span></div>
      <button class="btn-text" onclick="nav('shops')">전체 보기 →</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>상호명</th><th>사업자번호</th><th>주소</th><th>신청일</th><th>중복</th><th>액션</th></tr></thead>
        <tbody>
          ${pending.map(([sid,s])=>{
            const bn=normBN(s.businessNumber);
            const isDup=shops.some(([osid,o])=>osid!==sid&&normBN(o.businessNumber)===bn&&o.approvalStatus==="approved");
            return`<tr>
              <td class="fw-600">${esc(s.name)}</td>
              <td class="font-mono text-xs">${esc(s.businessNumber)}</td>
              <td class="text-dim text-xs">${esc(s.address)}</td>
              <td class="text-dim">${fmtDate(s.createdAt)}</td>

        <tbody>
          ${crewPending.map(c=>`<tr>
            <td class="fw-600">${esc(c.name)}</td>
            <td class="text-dim">${esc(c.shopName)}</td>
            <td class="text-dim">${esc(c.birthDate||"-")}</td>
            <td class="text-dim">${esc(c.vehicleInfo||"-")}</td>
            <td class="text-dim">${fmtDate(c.createdAt)}</td>

            </div></td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>`:""}

  ${pending.length===0&&crewPending.length===0&&dupBNs.length===0?`
  <div class="empty-state">
    <div class="empty-icon">✅</div>
    <div class="empty-title">모든 요청이 처리되었습니다</div>
    <div class="empty-sub">새 요청이 들어오면 이 화면에 표시됩니다</div>
  </div>`:""}`;
}

/* ── SHOPS ── */
function renderShops() {
  const shops = Object.entries(STATE.shops);
  return `
  <div class="page-header">
    <h1 class="page-title">사업장 관리</h1>
    <div class="page-subtitle">전체 ${shops.length}개 사업장</div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterShops(this,'all')">전체 (${shops.length})</button>
    <button class="filter-btn" onclick="filterShops(this,'pending')">대기 (${shops.filter(([,s])=>s.approvalStatus==='pending').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'approved')">승인 (${shops.filter(([,s])=>s.approvalStatus==='approved').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'rejected')">반려 (${shops.filter(([,s])=>s.approvalStatus==='rejected').length})</button>
  </div>
  <div class="shop-cards" id="shopCards">
    ${shops.length===0?'<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">등록된 사업장이 없습니다</div></div>'
      :shops.map(([sid,s])=>renderShopCard(sid,s,shops)).join("")}
  </div>`;
}

function renderShopCard(shopId, s, allShops) {
  const scls = {pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s.approvalStatus]||"";
  const stxt = {pending:"⏳ 승인 대기",approved:"✅ 승인 완료",rejected:"❌ 반려"}[s.approvalStatus]||"";
  const crews    = Object.entries(s.crews||{});
  const customers= Object.values(s.customers||{});
  const bn       = normBN(s.businessNumber);
  const isDup    = allShops.some(([osid,o])=>osid!==shopId&&normBN(o.businessNumber)===bn);
  const dupApproved = allShops.some(([osid,o])=>osid!==shopId&&normBN(o.businessNumber)===bn&&o.approvalStatus==="approved");

  return `
  <div class="shop-card" data-status="${s.approvalStatus}">
    <div class="shop-card-header">
      <div class="shop-card-info">
        <div class="shop-name">${esc(s.name)}${isDup?'<span class="dup-badge">사업자번호 중복</span>':''}</div>
        <div class="shop-meta">${esc(s.address)}</div>
        <div class="shop-meta font-mono text-xs">
          사업자번호: <strong>${esc(s.businessNumber)}</strong>
          &nbsp;·&nbsp;코드: <span class="code-chip">${esc(shopId)}</span>
        </div>
      </div>
      <span class="status-badge ${scls}">${stxt}</span>
    </div>
    <div class="shop-desc">${esc(s.description||"설명 없음")}</div>
    <div class="shop-stats">
      <div class="shop-stat"><span class="shop-stat-num">${customers.length}</span><span class="shop-stat-label">고객</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${crews.filter(([,c])=>c.approvalStatus==='approved').length}</span><span class="shop-stat-label">직원</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${crews.filter(([,c])=>c.approvalStatus==='pending').length}</span><span class="shop-stat-label">직원 대기</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${fmtDate(s.createdAt)}</span><span class="shop-stat-label">등록일</span></div>
    </div>
    ${s.approvalStatus==="pending"?`
    <div class="shop-card-actions">
      <button class="btn-approve" onclick="approveShop('${shopId}')" ${dupApproved?"disabled title='동일 사업자번호 승인 사업장 존재'":""}>✅ 승인</button>
      <button class="btn-reject"  onclick="rejectShop('${shopId}')">❌ 반려</button>
    </div>`:""}
    ${s.approvalStatus==="rejected"&&s.rejectedReason?`<div class="reject-reason">반려 사유: ${esc(s.rejectedReason)}</div>`:""}
    ${crews.filter(([,c])=>c.approvalStatus==="pending").length>0?`
    <div class="crew-pending-block">
      <div class="crew-pending-title">직원 승인 대기</div>
      ${crews.filter(([,c])=>c.approvalStatus==="pending").map(([cid,c])=>`
      <div class="crew-pending-row">
        <div><span class="fw-600">${esc(c.name)}</span><span class="text-dim text-xs"> · ${esc(c.vehicleInfo||"-")}</span></div>
        <div class="action-btns">
          <button class="btn-approve btn-sm" onclick="approveCrew('${shopId}','${cid}')">승인</button>
          <button class="btn-reject btn-sm"  onclick="rejectCrew('${shopId}','${cid}')">반려</button>
        </div>
      </div>`).join("")}
    </div>`:""}
  </div>`;
}

/* ── USERS ── */
function renderUsers() {
  const users  = Object.values(STATE.users);
  const owners = users.filter(u=>u.role==="owner");
  const crews  = users.filter(u=>u.role==="crew");
  return `
  <div class="page-header">
    <h1 class="page-title">유저 관리</h1>
    <div class="page-subtitle">사장 ${owners.length}명 · 직원 ${crews.length}명</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchUserTab(this,'owner')">사장 (${owners.length})</button>
    <button class="tab-btn"        onclick="switchUserTab(this,'crew')">직원 (${crews.length})</button>
  </div>
  <div id="userTableWrap">${renderUserTable(owners)}</div>`;
}
function renderUserTable(users) {
  if (!users.length) return '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">유저 없음</div></div>';
  return `<div class="table-wrap"><table class="data-table">
    <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>사업장 코드</th><th>상태</th><th>가입일</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td class="fw-600">${esc(u.name||"-")}</td>
      <td class="text-dim font-mono text-xs">${esc(u.email||"-")}</td>
      <td><span class="role-badge ${u.role==='owner'?'role-owner':'role-crew'}">${u.role==='owner'?'사장':'직원'}</span></td>
      <td><span class="code-chip font-mono text-xs">${esc(u.shopId||"-")}</span></td>
      <td><span class="status-badge ${statusCls(u.approvalStatus)}">${statusTxt(u.approvalStatus)}</span></td>
      <td class="text-dim">${fmtDate(u.createdAt)}</td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

/* ── STATS ── */
function renderStats() {
  const events = {};
  Object.values(STATE.stats.funnel).forEach(day => {
    Object.entries(day.ios||{}).forEach(([evt,devs]) => {
      events[evt] = (events[evt]||0) + Object.keys(devs).length;
    });
  });
  const eventList = Object.entries(events).sort((a,b)=>b[1]-a[1]);
  return `
  <div class="page-header"><h1 class="page-title">앱 통계</h1><div class="page-subtitle">세알 마스터 iOS 운영 지표</div></div>
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(37,99,235,.15)">📲</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.installs}</div><div class="kpi-label">누적 설치</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(16,185,129,.15)">📅</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.dau}</div><div class="kpi-label">오늘 DAU</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(124,58,237,.15)">🎯</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.length}</div><div class="kpi-label">이벤트 종류</div></div></div>
    <div class="kpi-card"><div class="kpi-icon" style="background:rgba(249,115,22,.15)">🔥</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.reduce((s,[,v])=>s+v,0)}</div><div class="kpi-label">총 이벤트</div></div></div>
  </div>
  <div class="section-block">
    <div class="section-header"><div class="section-title">퍼널 이벤트 현황</div></div>
    ${eventList.length===0?'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">데이터 없음</div></div>':`
    <div class="funnel-list">
      ${(()=>{const mx=eventList[0]?.[1]||1;return eventList.map(([e,c])=>`
      <div class="funnel-row">
        <div class="funnel-label font-mono">${esc(e)}</div>
        <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(c/mx*100)}%"></div></div>
        <div class="funnel-count fw-600">${c}</div>
      </div>`).join("")})()}
    </div>`}
  </div>`;
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtDate(ts){if(!ts)return"-";const d=new Date(ts>1e12?ts:ts*1000);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;}
function statusCls(s){return{pending:"badge-pending",approved:"badge-approved",rejected:"badge-rejected"}[s]||"";}
function statusTxt(s){return{pending:"⏳ 대기",approved:"✅ 승인",rejected:"❌ 반려"}[s]||s;}
function toast(msg){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},2800);
}
function showLoadingBar(on){document.getElementById("loadingBar").style.opacity=on?"1":"0";}
function showApp(user){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appShell").style.display="grid";
  document.getElementById("userEmail").textContent=`${user.email} (${remainingHours()}h 남음)`;
}
function showLogin(msg=""){
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("appShell").style.display="none";
  const errEl = document.getElementById("loginErr");
  if(errEl) errEl.textContent=msg;
  // 로그인 버튼 복원
  const btn = document.getElementById("loginBtn");
  if(btn){btn.disabled=false;btn.textContent="로그인";}
}

/* 전역 바인딩 */
window.nav=nav; window.login=login; window.logout=logout;
window.approveShop=approveShop; window.rejectShop=rejectShop;
window.approveCrew=approveCrew; window.rejectCrew=rejectCrew;
window.refresh=loadAll;
window.filterShops=function(btn,status){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".shop-card").forEach(c=>{
    c.style.display=(status==="all"||c.dataset.status===status)?"":"none";
  });
};
window.switchUserTab=function(btn,role){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("userTableWrap").innerHTML=
    renderUserTable(Object.values(STATE.users).filter(u=>u.role===role));
};
</script>

<style>
:root{

#loadingBar{position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:0% 0}}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(37,99,235,.14) 0%,transparent 70%),var(--bg)}

  padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}

.login-brand-name{font-size:18px;font-weight:800;letter-spacing:-.03em}

.form-field input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;margin-top:8px;background:var(--blue);color:#fff;border-radius:var(--r);

.login-btn:hover:not(:disabled){background:var(--blue2);transform:translateY(-1px)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}

/* APP SHELL */
#appShell{display:none;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:auto 1fr;min-height:100vh}

  padding:6px 12px;font-size:12px;font-weight:600;color:var(--text-sec);transition:color .15s,border-color .15s}

.sidebar{background:var(--bg-card);border-right:1px solid var(--stroke);padding:16px 12px;

.nav-section-label{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.1em;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  font-size:13px;font-weight:500;color:var(--text-sec);cursor:pointer;
  transition:background .12s,color .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg-hi);color:var(--text)}
.nav-item.active{background:var(--blue-dim);color:var(--blue);font-weight:700}
.nav-icon{font-size:16px;width:20px;text-align:center}
.main-content{padding:28px 32px 48px;overflow-y:auto;max-width:1200px}

/* PAGE */
.page-header{margin-bottom:24px}
.page-title{font-size:24px;font-weight:900;letter-spacing:-.04em}

  padding:20px;display:flex;align-items:center;gap:16px;transition:border-color .15s}
.kpi-card.alert{border-color:rgba(249,115,22,.4)}
.kpi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.filter-btn:hover{border-color:var(--blue);color:var(--text)}
.filter-btn.active{background:var(--blue-dim);border-color:rgba(37,99,235,.5);color:var(--blue)}

  background:var(--bg-card);border:1px solid var(--stroke);color:var(--text);
  padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .25s,transform .25s;z-index:9998}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  :root{--sidebar-w:60px}
  .nav-item span:not(.nav-icon){display:none}
  .nav-section-label{display:none}
  .main-content{padding:20px 16px 40px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .login-card{padding:32px 24px}
}
</style>
</head>
<body>
<div id="loadingBar"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark">🚗</div>
      <div>
        <div class="login-brand-name">세알 콘솔</div>
        <div class="login-brand-sub">Seal Admin Console</div>
      </div>
    </div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">Firebase Authentication에 등록된<br>관리자 계정으로만 접속 가능합니다.</div>
    <div class="form-field">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com"
             onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()"/>
    </div>
    <div class="form-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')login()"/>
