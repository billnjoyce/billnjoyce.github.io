<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>세알 콘솔</title>

<!-- Firebase SDK (modular CDN) -->
<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged }           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ── Firebase 설정 ── */
const app = initializeApp({
  apiKey:            "AIzaSyAoUQNXqxHfS1JmpIOU-etlM57b2WEidio",
  authDomain:        "carwash-4699b.firebaseapp.com",
  databaseURL:       "https://carwash-4699b.firebaseio.com",
  projectId:         "carwash-4699b",
  storageBucket:     "carwash-4699b.appspot.com",
  messagingSenderId: "209684707726",
  appId:             "1:209684707726:ios:feabc8fc02d4dec8a48cdf"
});
const auth = getAuth(app);
const db   = getDatabase(app);

/* ══════════════════════════════════════
   GLOBAL STATE
══════════════════════════════════════ */
let STATE = {
  page: "dashboard",   // dashboard | shops | users | stats
  shops: {},
  users: {},
  stats: { installs: 0, dau: 0, funnel: {} }
};

/* ══════════════════════════════════════
   AUTH
══════════════════════════════════════ */
onAuthStateChanged(auth, user => {
  if (user) { showApp(user); loadAll(); }
  else       { showLogin(); }
});

async function login() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const btn   = document.getElementById("loginBtn");
  const err   = document.getElementById("loginErr");
  err.textContent = "";
  btn.disabled = true; btn.textContent = "로그인 중...";
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    err.textContent = e.code === "auth/invalid-credential"
      ? "이메일 또는 비밀번호가 올바르지 않습니다."
      : "로그인에 실패했습니다. 다시 시도해 주세요.";
    btn.disabled = false; btn.textContent = "로그인";
  }
}

function logout() {
  if (confirm("로그아웃 하시겠습니까?")) signOut(auth);
}

/* ══════════════════════════════════════
   DATA LOAD
══════════════════════════════════════ */
async function loadAll() {
  showLoadingBar(true);
  try {
    const snap = await get(ref(db, "carwash-master"));
    if (!snap.exists()) { showLoadingBar(false); return; }
    const data = snap.val();

    /* shops */
    STATE.shops = (data.data?.shops) || {};

    /* users */
    STATE.users = (data.users) || {};

    /* stats */
    const instObj = data.install?.ios || {};
    STATE.stats.installs = Object.keys(instObj).length;
    const today = todayStr();
    const dauObj = data.dau?.[today]?.ios || {};
    let dauCount = 0;
    Object.values(dauObj).forEach(v => { dauCount += Object.keys(v).length; });
    STATE.stats.dau = dauCount;
    STATE.stats.funnel = data.funnel || {};
  } catch(e) { console.error(e); }
  showLoadingBar(false);
  renderPage();
}

/* ══════════════════════════════════════
   APPROVE / REJECT
══════════════════════════════════════ */
async function approveShop(shopId) {
  if (!confirm("이 사업장을 승인하시겠습니까?")) return;
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`] = "approved";
  // 사장 유저 프로필도 approved로
  const shop = STATE.shops[shopId];
  if (shop?.ownerId) {
    updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "approved";
  }
  await update(ref(db), updates);
  toast("✅ 사업장 승인 완료");
  loadAll();
}

async function rejectShop(shopId, reason) {
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/approvalStatus`] = "rejected";
  updates[`carwash-master/data/shops/${shopId}/rejectedReason`] = reason;
  const shop = STATE.shops[shopId];
  if (shop?.ownerId) {
    updates[`carwash-master/users/${shop.ownerId}/approvalStatus`] = "rejected";
    updates[`carwash-master/users/${shop.ownerId}/rejectedReason`] = reason;
  }
  await update(ref(db), updates);
  toast("❌ 사업장 반려 처리");
  loadAll();
}

async function approveCrew(shopId, crewId) {
  if (!confirm("이 직원을 승인하시겠습니까?")) return;
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "approved";
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "approved";
  await update(ref(db), updates);
  toast("✅ 직원 승인 완료");
  loadAll();
}

async function rejectCrew(shopId, crewId, reason) {
  const updates = {};
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/data/shops/${shopId}/crews/${crewId}/rejectedReason`] = reason;
  updates[`carwash-master/users/${crewId}/approvalStatus`] = "rejected";
  updates[`carwash-master/users/${crewId}/rejectedReason`] = reason;
  await update(ref(db), updates);
  toast("❌ 직원 반려 처리");
  loadAll();
}

/* ══════════════════════════════════════
   RENDER HELPERS
══════════════════════════════════════ */
function nav(page) {
  STATE.page = page;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.toggle("active", el.dataset.page === page));
  renderPage();
}

function renderPage() {
  const main = document.getElementById("mainContent");
  switch(STATE.page) {
    case "dashboard": main.innerHTML = renderDashboard(); break;
    case "shops":     main.innerHTML = renderShops();     break;
    case "users":     main.innerHTML = renderUsers();     break;
    case "stats":     main.innerHTML = renderStats();     break;
  }
}

function renderDashboard() {
  const shops   = Object.values(STATE.shops);
  const pending = shops.filter(s => s.approvalStatus === "pending");
  const approved= shops.filter(s => s.approvalStatus === "approved");

  // 전체 직원 승인 대기
  let crewPending = [];
  shops.forEach(shop => {
    if (!shop.crews) return;
    Object.entries(shop.crews).forEach(([crewId, crew]) => {
      if (crew.approvalStatus === "pending") {
        crewPending.push({ ...crew, crewId, shopId: shop.id, shopName: shop.name });
      }
    });
  });

  return `
  <div class="page-header">
    <h1 class="page-title">대시보드</h1>
    <div class="page-subtitle">세알 마스터 운영 현황 — ${todayStr()} 기준</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(37,99,235,.15)">🏪</div>
      <div class="kpi-body">
        <div class="kpi-num">${shops.length}</div>
        <div class="kpi-label">전체 사업장</div>
      </div>
      <div class="kpi-change positive">승인 ${approved.length}</div>
    </div>
    <div class="kpi-card ${pending.length > 0 ? 'alert' : ''}">
      <div class="kpi-icon" style="background:rgba(249,115,22,.15)">⏳</div>
      <div class="kpi-body">
        <div class="kpi-num">${pending.length}</div>
        <div class="kpi-label">승인 대기 사업장</div>
      </div>
      ${pending.length > 0 ? '<div class="kpi-change warn">검토 필요</div>' : '<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card ${crewPending.length > 0 ? 'alert' : ''}">
      <div class="kpi-icon" style="background:rgba(124,58,237,.15)">👷</div>
      <div class="kpi-body">
        <div class="kpi-num">${crewPending.length}</div>
        <div class="kpi-label">직원 승인 대기</div>
      </div>
      ${crewPending.length > 0 ? '<div class="kpi-change warn">검토 필요</div>' : '<div class="kpi-change positive">없음</div>'}
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(16,185,129,.15)">📊</div>
      <div class="kpi-body">
        <div class="kpi-num">${STATE.stats.installs}</div>
        <div class="kpi-label">누적 설치</div>
      </div>
      <div class="kpi-change positive">DAU ${STATE.stats.dau}</div>
    </div>
  </div>

  ${pending.length > 0 ? `
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">🔔 사업장 승인 대기 <span class="badge-alert">${pending.length}</span></div>
      <button class="btn-text" onclick="nav('shops')">전체 보기 →</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>상호명</th><th>주소</th><th>사업자번호</th><th>신청일</th><th>액션</th></tr></thead>
        <tbody>
          ${pending.map(s => `
          <tr>
            <td><span class="fw-600">${esc(s.name)}</span></td>
            <td class="text-dim">${esc(s.address)}</td>
            <td class="text-dim font-mono">${esc(s.businessNumber)}</td>
            <td class="text-dim">${fmtDate(s.createdAt)}</td>
            <td>
              <div class="action-btns">
                <button class="btn-approve" onclick="approveShop('${s.id}')">승인</button>
                <button class="btn-reject"  onclick="promptReject('shop','${s.id}')">반려</button>
              </div>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>` : ""}

  ${crewPending.length > 0 ? `
  <div class="section-block">
    <div class="section-header">
      <div class="section-title">👷 직원 승인 대기 <span class="badge-alert">${crewPending.length}</span></div>
      <button class="btn-text" onclick="nav('shops')">전체 보기 →</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th>이름</th><th>소속 사업장</th><th>생년월일</th><th>차량 정보</th><th>신청일</th><th>액션</th></tr></thead>
        <tbody>
          ${crewPending.map(c => `
          <tr>
            <td><span class="fw-600">${esc(c.name)}</span></td>
            <td class="text-dim">${esc(c.shopName)}</td>
            <td class="text-dim">${esc(c.birthDate||"-")}</td>
            <td class="text-dim">${esc(c.vehicleInfo||"-")}</td>
            <td class="text-dim">${fmtDate(c.createdAt)}</td>
            <td>
              <div class="action-btns">
                <button class="btn-approve" onclick="approveCrew('${c.shopId}','${c.crewId}')">승인</button>
                <button class="btn-reject"  onclick="promptReject('crew','${c.shopId}','${c.crewId}')">반려</button>
              </div>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
  </div>` : ""}

  ${pending.length === 0 && crewPending.length === 0 ? `
  <div class="empty-state">
    <div class="empty-icon">✅</div>
    <div class="empty-title">모든 승인 요청이 처리되었습니다</div>
    <div class="empty-sub">새 요청이 들어오면 이 화면에 표시됩니다</div>
  </div>` : ""}
  `;
}

function renderShops() {
  const shops = Object.values(STATE.shops);
  return `
  <div class="page-header">
    <h1 class="page-title">사업장 관리</h1>
    <div class="page-subtitle">전체 ${shops.length}개 사업장</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterShops(this,'all')">전체 (${shops.length})</button>
    <button class="filter-btn" onclick="filterShops(this,'pending')">대기 (${shops.filter(s=>s.approvalStatus==='pending').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'approved')">승인 (${shops.filter(s=>s.approvalStatus==='approved').length})</button>
    <button class="filter-btn" onclick="filterShops(this,'rejected')">반려 (${shops.filter(s=>s.approvalStatus==='rejected').length})</button>
  </div>

  <div class="shop-cards" id="shopCards">
    ${shops.length === 0 ? `<div class="empty-state"><div class="empty-icon">🏪</div><div class="empty-title">등록된 사업장이 없습니다</div></div>` :
      shops.map(s => renderShopCard(s)).join("")}
  </div>`;
}

function renderShopCard(s) {
  const statusCls = { pending: "badge-pending", approved: "badge-approved", rejected: "badge-rejected" }[s.approvalStatus] || "";
  const statusTxt = { pending: "⏳ 승인 대기", approved: "✅ 승인 완료", rejected: "❌ 반려" }[s.approvalStatus] || s.approvalStatus;
  const crews = s.crews ? Object.values(s.crews) : [];
  const customers = s.customers ? Object.values(s.customers) : [];
  const approvedCrews = crews.filter(c => c.approvalStatus === "approved");

  return `
  <div class="shop-card" data-status="${s.approvalStatus}">
    <div class="shop-card-header">
      <div class="shop-card-info">
        <div class="shop-name">${esc(s.name)}</div>
        <div class="shop-meta">${esc(s.address)}</div>
        <div class="shop-meta font-mono text-xs">${esc(s.businessNumber)} · <span class="code-chip">${esc(s.id)}</span></div>
      </div>
      <div class="shop-card-status">
        <span class="status-badge ${statusCls}">${statusTxt}</span>
      </div>
    </div>

    <div class="shop-desc">${esc(s.description || "설명 없음")}</div>

    <div class="shop-stats">
      <div class="shop-stat"><span class="shop-stat-num">${customers.length}</span><span class="shop-stat-label">고객</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${approvedCrews.length}</span><span class="shop-stat-label">직원</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${crews.filter(c=>c.approvalStatus==='pending').length}</span><span class="shop-stat-label">직원 대기</span></div>
      <div class="shop-stat"><span class="shop-stat-num">${fmtDate(s.createdAt)}</span><span class="shop-stat-label">등록일</span></div>
    </div>

    ${s.approvalStatus === "pending" ? `
    <div class="shop-card-actions">
      <button class="btn-approve" onclick="approveShop('${s.id}')">✅ 승인</button>
      <button class="btn-reject"  onclick="promptReject('shop','${s.id}')">❌ 반려</button>
    </div>` : ""}

    ${s.approvalStatus === "rejected" && s.rejectedReason ? `
    <div class="reject-reason">반려 사유: ${esc(s.rejectedReason)}</div>` : ""}

    ${crews.filter(c=>c.approvalStatus==='pending').length > 0 ? `
    <div class="crew-pending-block">
      <div class="crew-pending-title">직원 승인 대기</div>
      ${crews.filter(c=>c.approvalStatus==='pending').map(c => `
      <div class="crew-pending-row">
        <div>
          <span class="fw-600">${esc(c.name)}</span>
          <span class="text-dim text-xs"> · ${esc(c.vehicleInfo||"-")}</span>
        </div>
        <div class="action-btns">
          <button class="btn-approve btn-sm" onclick="approveCrew('${s.id}','${c.id||Object.keys(s.crews||{}).find(k=>s.crews[k]===c)||""}')">승인</button>
          <button class="btn-reject btn-sm"  onclick="promptReject('crew','${s.id}','${Object.keys(s.crews||{}).find(k=>s.crews[k]===c)||""}')">반려</button>
        </div>
      </div>`).join("")}
    </div>` : ""}
  </div>`;
}

function renderUsers() {
  const users = Object.values(STATE.users);
  const owners = users.filter(u => u.role === "owner");
  const crews  = users.filter(u => u.role === "crew");
  return `
  <div class="page-header">
    <h1 class="page-title">유저 관리</h1>
    <div class="page-subtitle">사장 ${owners.length}명 · 직원 ${crews.length}명</div>
  </div>
  <div class="tabs" id="userTabs">
    <button class="tab-btn active" onclick="switchUserTab(this,'owner')">사장 (${owners.length})</button>
    <button class="tab-btn"        onclick="switchUserTab(this,'crew')">직원 (${crews.length})</button>
  </div>
  <div id="userTableWrap">
    ${renderUserTable(owners)}
  </div>`;
}

function renderUserTable(users) {
  if (users.length === 0) return `<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">유저가 없습니다</div></div>`;
  return `
  <div class="table-wrap">
    <table class="data-table">
      <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>사업장 코드</th><th>상태</th><th>가입일</th></tr></thead>
      <tbody>
        ${users.map(u => `
        <tr>
          <td><span class="fw-600">${esc(u.name||"-")}</span></td>
          <td class="text-dim font-mono text-xs">${esc(u.email||"-")}</td>
          <td><span class="role-badge ${u.role==='owner'?'role-owner':'role-crew'}">${u.role==='owner'?'사장':'직원'}</span></td>
          <td><span class="code-chip font-mono text-xs">${esc(u.shopId||"-")}</span></td>
          <td><span class="status-badge ${statusCls(u.approvalStatus)}">${statusTxt(u.approvalStatus)}</span></td>
          <td class="text-dim">${fmtDate(u.createdAt)}</td>
        </tr>`).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderStats() {
  const funnelData = STATE.stats.funnel;
  const events = {};
  Object.values(funnelData).forEach(dayObj => {
    Object.entries(dayObj.ios||{}).forEach(([evt, devices]) => {
      events[evt] = (events[evt]||0) + Object.keys(devices).length;
    });
  });
  const eventList = Object.entries(events).sort((a,b)=>b[1]-a[1]);

  return `
  <div class="page-header">
    <h1 class="page-title">앱 통계</h1>
    <div class="page-subtitle">세알 마스터 iOS 앱 운영 지표</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(37,99,235,.15)">📲</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.installs}</div><div class="kpi-label">누적 설치 (총 기기)</div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(16,185,129,.15)">📅</div>
      <div class="kpi-body"><div class="kpi-num">${STATE.stats.dau}</div><div class="kpi-label">오늘 DAU</div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(124,58,237,.15)">🎯</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.length}</div><div class="kpi-label">퍼널 이벤트 종류</div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" style="background:rgba(249,115,22,.15)">🔥</div>
      <div class="kpi-body"><div class="kpi-num">${eventList.reduce((s,[,v])=>s+v,0)}</div><div class="kpi-label">총 이벤트 발생</div></div>
    </div>
  </div>

  <div class="section-block">
    <div class="section-header"><div class="section-title">퍼널 이벤트 현황</div></div>
    ${eventList.length === 0 ? `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">퍼널 데이터 없음</div><div class="empty-sub">앱 사용자가 생기면 이 화면에 데이터가 표시됩니다</div></div>` : `
    <div class="funnel-list">
      ${(() => {
        const max = eventList[0]?.[1] || 1;
        return eventList.map(([evt, cnt]) => `
        <div class="funnel-row">
          <div class="funnel-label font-mono">${esc(evt)}</div>
          <div class="funnel-bar-wrap">
            <div class="funnel-bar" style="width:${Math.round(cnt/max*100)}%"></div>
          </div>
          <div class="funnel-count fw-600">${cnt}</div>
        </div>`).join("");
      })()}
    </div>`}
  </div>`;
}

/* ══════════════════════════════════════
   UI INTERACTIONS
══════════════════════════════════════ */
window.nav = nav;
window.approveShop = approveShop;
window.approveCrew = approveCrew;
window.promptReject = function(type, shopId, crewId) {
  const reason = prompt(type === "shop" ? "반려 사유를 입력하세요:" : "직원 반려 사유를 입력하세요:");
  if (reason === null) return;
  if (type === "shop") rejectShop(shopId, reason || "검토 후 반려");
  else rejectCrew(shopId, crewId, reason || "검토 후 반려");
};
window.login = login;
window.logout = logout;
window.filterShops = function(btn, status) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".shop-card").forEach(card => {
    card.style.display = (status === "all" || card.dataset.status === status) ? "" : "none";
  });
};
window.switchUserTab = function(btn, role) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const users = Object.values(STATE.users).filter(u => u.role === role);
  document.getElementById("userTableWrap").innerHTML = renderUserTable(users);
};
window.refresh = loadAll;

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDate(ts) {
  if (!ts) return "-";
  const d = new Date(ts > 1e12 ? ts : ts * 1000);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}
function statusCls(s) {
  return { pending:"badge-pending", approved:"badge-approved", rejected:"badge-rejected" }[s] || "";
}
function statusTxt(s) {
  return { pending:"⏳ 대기", approved:"✅ 승인", rejected:"❌ 반려" }[s] || s;
}
function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => { t.classList.remove("show"); setTimeout(()=>t.remove(),300); }, 2800);
}
function showLoadingBar(on) {
  document.getElementById("loadingBar").style.opacity = on ? "1" : "0";
}
function showApp(user) {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appShell").style.display    = "grid";
  document.getElementById("userEmail").textContent     = user.email;
}
function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appShell").style.display    = "none";
}
</script>
