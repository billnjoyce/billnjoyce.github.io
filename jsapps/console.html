<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JSApps · 통계 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg-2:#0e131c; --panel:#121925; --panel-2:#161f2e; --panel-3:#1a2435;
  --line:#1e293b; --line-2:#26344a;
  --txt:#e8eef7; --txt-2:#9fb0c8; --txt-3:#5d6e87;
  --accent:#5e8bff; --accent-2:#7c5cff;
  --dau:#ff6b5e; --installs:#5b8def; --updates:#3ddc97; --sales:#ffb23e; --events:#b06bff;
  --good:#3ddc97; --bad:#ff6b5e;
  --radius:18px; --radius-sm:12px;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --display:'Sora',system-ui,sans-serif;
  --body:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--body); background:var(--bg); color:var(--txt);
  -webkit-font-smoothing:antialiased; line-height:1.45;
  background-image:
    radial-gradient(1100px 700px at 85% -10%, rgba(124,92,255,.10), transparent 60%),
    radial-gradient(900px 600px at -5% 0%, rgba(94,139,255,.10), transparent 55%);
  background-attachment:fixed;
}
::selection{background:rgba(94,139,255,.3)}
.app{max-width:1340px;margin:0 auto;padding:22px clamp(14px,3vw,32px) 90px}

/* Header */
.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:13px;cursor:pointer}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:18px;color:#fff;
  box-shadow:0 8px 24px -6px rgba(94,139,255,.6);flex-shrink:0}
.brand h1{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em;line-height:1.1}
.brand .sub{font-size:11.5px;color:var(--txt-3);font-family:var(--mono);margin-top:2px}
.spacer{flex:1}

.status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt-2);font-family:var(--mono);
  background:var(--panel);border:1px solid var(--line);padding:7px 12px;border-radius:30px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--txt-3);flex-shrink:0}
.dot.live{background:var(--good);box-shadow:0 0 0 0 rgba(61,220,151,.6);animation:pulse 2s infinite}
.dot.mock{background:var(--sales)}
.dot.err{background:var(--bad)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,220,151,.5)}70%{box-shadow:0 0 0 7px rgba(61,220,151,0)}100%{box-shadow:0 0 0 0 rgba(61,220,151,0)}}

/* Controls bar */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{font-family:var(--body);font-size:13px;font-weight:600;color:var(--txt-2);background:none;border:none;
  padding:8px 15px;border-radius:8px;cursor:pointer;transition:.18s;white-space:nowrap}
.seg button:hover{color:var(--txt)}
.seg button.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 4px 14px -4px rgba(94,139,255,.6)}

.datenav{display:inline-flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px}
.datenav button{width:34px;height:34px;border-radius:8px;border:none;background:none;color:var(--txt-2);cursor:pointer;font-size:16px;transition:.15s;display:grid;place-items:center}
.datenav button:hover{background:var(--panel-3);color:var(--txt)}
.datenav .cur{font-family:var(--mono);font-size:13px;font-weight:600;padding:0 12px;min-width:108px;text-align:center;cursor:pointer;color:var(--txt);direction:ltr;unicode-bidi:isolate;font-variant-numeric:lining-nums;-webkit-locale:"en"}
.datenav .cur:hover{color:var(--accent)}

.rangepick{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.rangepick button{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--txt-2);background:none;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.rangepick button:hover{color:var(--txt)}
.rangepick button.on{background:var(--panel-3);color:var(--accent)}

.gear{margin-left:auto;width:40px;height:40px;border-radius:11px;background:var(--panel);border:1px solid var(--line);color:var(--txt-2);cursor:pointer;display:grid;place-items:center;transition:.15s;font-size:17px}
.gear:hover{color:var(--txt);border-color:var(--line-2)}

/* Platform filter */
.platformbar{display:flex;align-items:center;gap:11px;margin-bottom:22px;flex-wrap:wrap}
.platformbar .pflabel{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--txt-3);font-family:var(--mono)}
.pfseg button{font-family:var(--mono);font-size:12.5px}

/* KPI strip */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 17px;position:relative;overflow:hidden;transition:.2s;cursor:pointer}
.kpi:hover{border-color:var(--line-2);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
.kpi .klabel{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--txt-3);display:flex;align-items:center;gap:6px}
.kpi .klabel i{width:7px;height:7px;border-radius:50%;background:var(--c);display:inline-block}
.kpi .kval{font-family:var(--display);font-weight:700;font-size:27px;letter-spacing:-.02em;margin-top:9px;line-height:1}
.kpi .kdelta{font-family:var(--mono);font-size:11.5px;margin-top:8px;display:flex;align-items:center;gap:4px}
.kdelta.up{color:var(--good)} .kdelta.down{color:var(--bad)} .kdelta.flat{color:var(--txt-3)}
.kpi .spark{position:absolute;right:12px;bottom:10px;width:64px;height:26px;opacity:.55}
.kpi .pfbar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:10px;background:var(--bg-2);gap:1px}
.kpi .pfbar span{display:block;height:100%}

/* rank badge on app card */
.card .rank{position:absolute;top:0;left:0;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--txt-3);
  background:var(--panel-3);border-bottom-right-radius:10px;padding:4px 9px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.card .rank.r1{color:#1a1205;background:linear-gradient(135deg,#ffd76b,#ffb23e)}
.card .rank.r2{color:#0e1116;background:linear-gradient(135deg,#dfe7f2,#aab8cc)}
.card .rank.r3{color:#1a0e08;background:linear-gradient(135deg,#f0b896,#cf8a5e)}

/* platform breakdown table */
.pftable-wrap{overflow-x:auto}
.pftable{width:100%;border-collapse:collapse;font-size:13px}
.pftable th,.pftable td{text-align:right;padding:10px 14px;font-family:var(--mono)}
.pftable th{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--txt-3);border-bottom:1px solid var(--line-2)}
.pftable th:first-child,.pftable td:first-child{text-align:left}
.pftable td{color:var(--txt);border-bottom:1px solid var(--line)}
.pftable .pfname{display:flex;align-items:center;gap:8px;color:var(--txt-2);font-family:var(--body);font-weight:600}
.pftable .pfname i{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pftable tr.tot td{border-bottom:none;border-top:1px solid var(--line-2);color:var(--txt);font-weight:700;font-family:var(--body)}
.pftable tr.tot td:first-child{color:var(--txt-2)}

/* Engagement cards (MAU / stickiness) */
.engage{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:8px}
.engage-card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.engage-card.mau{border-left:3px solid #5e8bff}
.engage-card.stick{border-left:3px solid var(--updates)}
.engage-card .ec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.engage-card .ec-label{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--txt)}
.engage-card .ec-label i{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.engage-card .ec-sub{font-size:11px;font-weight:500;color:var(--txt-3);font-family:var(--mono);margin-left:2px}
.engage-card .ec-spark{width:84px;height:30px;opacity:.7;flex-shrink:0}
.engage-card .ec-val{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.02em;margin-top:12px;line-height:1}
.engage-card .ec-unit{font-size:18px;color:var(--txt-2);margin-left:2px}
.engage-card .ec-meta{font-family:var(--mono);font-size:12px;margin-top:9px;color:var(--txt-3)}
.engage-card .ec-band{font-weight:600}
@media(max-width:720px){.engage{grid-template-columns:1fr}}
.sec{display:flex;align-items:baseline;gap:11px;margin:30px 2px 15px}
.sec h2{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.01em}
.sec .hint{font-size:12px;color:var(--txt-3);font-family:var(--mono)}

/* Main chart panel */
.panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.charthead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.legend{display:flex;gap:7px;flex-wrap:wrap}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--mono);color:var(--txt-2);
  background:var(--panel-3);border:1px solid var(--line);padding:5px 11px;border-radius:30px;cursor:pointer;transition:.15s;user-select:none}
.lg:hover{border-color:var(--line-2)}
.lg.off{opacity:.38}
.lg i{width:9px;height:9px;border-radius:50%;background:var(--c)}
.chartwrap{position:relative;width:100%;height:340px;min-height:340px}
.chartwrap svg{display:block;width:100%;height:340px;overflow:visible}
.tip{position:absolute;pointer-events:none;background:rgba(10,14,20,.96);border:1px solid var(--line-2);border-radius:10px;
  padding:10px 12px;font-size:12px;min-width:140px;opacity:0;transition:opacity .12s;z-index:10;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
.tip .td{font-family:var(--mono);font-size:11px;color:var(--txt-3);margin-bottom:7px}
.tip .tr{display:flex;align-items:center;gap:7px;justify-content:space-between;margin:3px 0}
.tip .tr .nm{display:flex;align-items:center;gap:6px;color:var(--txt-2)}
.tip .tr i{width:8px;height:8px;border-radius:50%}
.tip .tr .vv{font-family:var(--mono);font-weight:600;color:var(--txt)}

/* App grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);
  padding:17px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--line-2);transform:translateY(-3px);box-shadow:var(--shadow)}
.card .chead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.icon{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:19px;color:#fff;flex-shrink:0;box-shadow:0 6px 16px -6px rgba(0,0,0,.5);overflow:hidden}
.icon img{width:100%;height:100%;object-fit:cover;border-radius:13px}
.card .nm{font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:-.01em;line-height:1.2}
.card .ver{font-family:var(--mono);font-size:11px;color:var(--txt-3);margin-top:3px}
.card .mini{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:13px}
.card .mi{text-align:center;background:var(--panel-3);border-radius:9px;padding:8px 4px}
.card .mi .ml{font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--txt-3)}
.card .mi .mv{font-family:var(--mono);font-weight:600;font-size:13px;margin-top:3px}
.card .cspark{height:54px;width:100%}
.card .arrow{position:absolute;top:17px;right:17px;color:var(--txt-3);transition:.2s;font-size:15px}
.card:hover .arrow{color:var(--accent);transform:translate(2px,-2px)}

/* Detail view */
.detail{display:none}
.detail.show{display:block;animation:fade .3s}
.dashboard.hide{display:none}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.back{display:inline-flex;align-items:center;gap:8px;font-family:var(--body);font-size:13px;font-weight:600;color:var(--txt-2);
  background:var(--panel);border:1px solid var(--line);padding:9px 16px;border-radius:11px;cursor:pointer;transition:.15s;margin-bottom:18px}
.back:hover{color:var(--txt);border-color:var(--line-2)}
.dhead{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.dhead .icon{width:62px;height:62px;font-size:25px;border-radius:17px}
.dhead .dt h2{font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:-.02em}
.dhead .dt .dd{color:var(--txt-2);font-size:13px;margin-top:4px}
.dhead .dt .dmeta{font-family:var(--mono);font-size:11.5px;color:var(--txt-3);margin-top:6px;display:flex;gap:14px;flex-wrap:wrap}

.metricgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px;margin-bottom:24px}
.mcard{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:17px;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
.mcard .ml{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--txt-3);display:flex;align-items:center;gap:6px}
.mcard .ml i{width:7px;height:7px;border-radius:50%;background:var(--c)}
.mcard .mv{font-family:var(--display);font-weight:700;font-size:26px;margin-top:8px;letter-spacing:-.02em}
.mcard .md{font-family:var(--mono);font-size:11.5px;margin-top:6px}
.mcard .ms{width:100%;height:40px;margin-top:8px}

/* Settings modal */
.modal{position:fixed;inset:0;background:rgba(5,8,12,.72);backdrop-filter:blur(6px);z-index:100;display:none;place-items:center;padding:20px}
.modal.show{display:grid;animation:fade .2s}
.sheet{background:var(--panel);border:1px solid var(--line-2);border-radius:20px;padding:26px;max-width:520px;width:100%;box-shadow:var(--shadow)}
.sheet h3{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:6px}
.sheet p.desc{font-size:13px;color:var(--txt-2);margin-bottom:18px;line-height:1.5}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:6px;font-family:var(--mono)}
.field input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:var(--mono);font-size:13px;transition:.15s}
.field input:focus{outline:none;border-color:var(--accent)}
.modalbtns{display:flex;gap:10px;margin-top:20px}
.btn{font-family:var(--body);font-weight:600;font-size:13.5px;padding:11px 18px;border-radius:11px;cursor:pointer;border:1px solid var(--line);background:var(--panel-3);color:var(--txt);transition:.15s;flex:1}
.btn:hover{border-color:var(--line-2)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff}
.btn.primary:hover{filter:brightness(1.08)}
.note{font-size:11.5px;color:var(--txt-3);margin-top:14px;line-height:1.5;font-family:var(--mono)}

/* Error screen */
.errbox{max-width:560px;margin:40px auto;text-align:center;background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);border-radius:var(--radius);padding:40px 32px;box-shadow:var(--shadow)}
.errbox .erricon{font-size:42px;margin-bottom:14px}
.errbox h2{font-family:var(--display);font-weight:700;font-size:20px;margin-bottom:10px}
.errbox .errmsg{color:var(--bad);font-family:var(--mono);font-size:13px;background:rgba(255,107,94,.08);
  border:1px solid rgba(255,107,94,.2);border-radius:10px;padding:11px 14px;margin-bottom:22px;word-break:break-word;line-height:1.5}
.errbox .errhint{text-align:left;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:22px}
.errbox .errhint p{font-size:13px;color:var(--txt-2);font-weight:600;margin-bottom:9px}
.errbox .errhint ul{margin:0;padding-left:18px}
.errbox .errhint li{font-size:12.5px;color:var(--txt-2);line-height:1.7;margin-bottom:4px}
.errbox .errhint code{font-family:var(--mono);font-size:11.5px;background:var(--panel-3);padding:2px 6px;border-radius:5px;color:var(--accent)}
.errbox .errhint b{color:var(--txt)}
.errbtns{display:flex;gap:10px;justify-content:center}
.errbtns .btn{flex:0 0 auto;min-width:120px}

/* Loading / empty */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--txt-3);font-family:var(--mono);font-size:13px}
.skel{background:linear-gradient(90deg,var(--panel) 25%,var(--panel-3) 50%,var(--panel) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius)}
@keyframes shimmer{to{background-position:-200% 0}}

/* Responsive */
@media(max-width:1024px){
  .kpis{grid-template-columns:repeat(5,1fr);gap:9px}
  .kpi{padding:13px}
  .kpi .kval{font-size:22px}
  .kpi .spark{display:none}
}
@media(max-width:720px){
  .app{padding:16px 14px 70px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .kpis .kpi:last-child{grid-column:1/-1}
  .controls{gap:8px}
  .seg{flex:1;justify-content:center}
  .seg button{flex:1;padding:9px 8px}
  .gear{margin-left:0}
  .chartwrap{height:280px;min-height:280px}
  .chartwrap svg{height:280px}
  .grid{grid-template-columns:1fr}
  .status .txt{display:none}
  .dhead .icon{width:52px;height:52px}
  .dhead .dt h2{font-size:20px}
}
/* 시간대(24h) 차트 */
.hourly{display:flex;flex-direction:column;gap:12px}
.hourbar-chips{display:flex;gap:7px;flex-wrap:wrap}
.hourbar-chips .hchip{font-family:var(--body);font-size:12.5px;font-weight:600;color:var(--txt-2);
  background:var(--panel-3);border:1px solid var(--line);padding:6px 13px;border-radius:9px;cursor:pointer;transition:.15s;
  display:inline-flex;align-items:center;gap:6px}
.hourbar-chips .hchip::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c)}
.hourbar-chips .hchip:hover:not(:disabled){color:var(--txt);border-color:var(--line-2)}
.hourbar-chips .hchip.on{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--c),var(--c));box-shadow:0 4px 14px -6px var(--c)}
.hourbar-chips .hchip:disabled{opacity:.32;cursor:not-allowed}
.hourmeta{font-family:var(--mono);font-size:12px;color:var(--txt-3)}
.hourmeta b{font-weight:700}
.hourchart{position:relative}
.hourchart .tip .tipdiv{height:1px;background:var(--line);margin:7px 0}
.hoursvg{width:100%;height:240px;display:block;touch-action:pan-y}
.hourempty{font-family:var(--mono);font-size:12.5px;color:var(--txt-3);padding:28px 4px;text-align:center}
@media(max-width:420px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .rangepick button{padding:8px 9px}
  .datenav .cur{min-width:90px;font-size:12px}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="top">
    <div class="brand" onclick="App.goHome()">

<script>
/* ============================================================
   JSApps Analytics — core logic
   - FirebaseSource: anonymous auth + REST read of jsapps/{appId}
   - MockSource: offline demo using window.JS_DB
   - iOS-faithful leaf counting, full-node caching, SVG charts
   ============================================================ */

const METRICS = [
  { key:'dau',      label:'DAU',      color:'var(--dau)',      raw:'#ff6b5e' },
  { key:'installs', label:'Installs', color:'var(--installs)', raw:'#5b8def' },
  { key:'updates',  label:'Updates',  color:'var(--updates)',  raw:'#3ddc97' },
  { key:'sales',    label:'Sales',    color:'var(--sales)',    raw:'#ffb23e' },
  { key:'events',   label:'Events',   color:'var(--events)',   raw:'#b06bff' },
];
const ICON_COLORS = ['#FF6B4A','#3DDC97','#5B8DEF','#9B6BFF','#FFB23E','#FF5C8A','#21C7C7','#FF8A3D'];

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(n>=1e4?0:1)+'K':String(n);
const fmtFull = n => n.toLocaleString('en-US');
function pad(n){return String(n).padStart(2,'0')}
function toISO(d){if(!(d instanceof Date)||isNaN(d))return '';return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseISO(s){
  if(!s||typeof s!=='string')return new Date(NaN);
  // accept YYYY-MM-DD, YYYY.MM.DD, YYYY/MM/DD
  const m=s.match(/(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})/);
  if(!m)return new Date(NaN);
  return new Date(+m[1],+m[2]-1,+m[3]);
}
function shiftISO(iso,days){const d=parseISO(iso);if(isNaN(d))return iso;d.setDate(d.getDate()+days);return toISO(d)}
function mmdd(iso){const [,m,d]=iso.split('-');return m+'.'+d}
// 정상 ISO 날짜 키만 인정 (아랍 숫자 등 오염 키 제외). 형식 YYYY-MM-DD + 실제 달력 유효성.
// 상한 연도는 하드코딩하지 않고, '오늘 +1년'까지 허용 (2568 등 비정상 미래 연도만 차단).
const VALID_ISO=/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/;   // ASCII 숫자만 매칭 (아랍 숫자는 자동 제외)
function isValidDateKey(k){
  if(typeof k!=='string'||!VALID_ISO.test(k)) return false;
  const y=+k.slice(0,4), mo=+k.slice(5,7), da=+k.slice(8,10);
  if(mo<1||mo>12||da<1||da>31) return false;
  if(y<2000) return false;                         // 하한만 최소한으로
  const maxY=new Date().getFullYear()+1;           // 오늘 기준 동적 상한
  return y<=maxY;
}
function hashColor(id){let h=0;for(const c of id)h=(h*31+c.charCodeAt(0))&0xffffff;return ICON_COLORS[Math.abs(h)%ICON_COLORS.length]}

/* Platform-aware counting — matches the real Firebase export structure:
     {metric}/{date}/[platform]/{version}/{deviceId} -> ts        (most apps)
     {metric}/{date}/{version}/{deviceId} -> ts                   (legacy: carfund dau/installs, no platform)
     events/sales nest deeper under deviceId, but the COUNT UNIT is the deviceId level.
   We return { platform: count }, where count = number of IDs across all versions.
   Legacy (no platform layer) is bucketed under 'unknown' (still included in 'all'). */
const KNOWN_PLATFORMS = ['ios','android','toss','web'];

// count IDs across versions: versionNode = { version: { id: <anything> } }
// 이미 집계된 형태({version: 3} 또는 노드 자체가 숫자)도 그 숫자값으로 정확히 합산한다.
function countVersions(vnode){
  if(vnode==null) return 0;
  if(typeof vnode==='number') return vnode;        // 이미 집계된 카운트
  if(typeof vnode!=='object') return 1;
  let c=0;
  for(const ver in vnode){
    const idnode=vnode[ver];
    if(idnode==null) continue;
    if(typeof idnode==='number') c += idnode;       // {version: count}
    else if(typeof idnode==='object') c += Object.keys(idnode).length; // {version:{deviceId:ts}}
    else c += 1;
  }
  return c;
}

// returns { platform: count } for a single date node
function countByPlatform(node){
  if(node==null) return {};
  if(typeof node==='number') return {unknown:node}; // 날짜 노드가 바로 숫자인 경우
  if(typeof node!=='object') return {};
  const keys=Object.keys(node);
  const firstKey=keys[0];
  const hasPlatform = firstKey!==undefined && KNOWN_PLATFORMS.includes(String(firstKey).toLowerCase());
  const out={};
  if(hasPlatform){
    for(const pf in node){
      const pfl=String(pf).toLowerCase();
      if(!KNOWN_PLATFORMS.includes(pfl)) continue;
      out[pfl]=(out[pfl]||0)+countVersions(node[pf]);
    }
  }else{
    out['unknown']=(out['unknown']||0)+countVersions(node);
  }
  return out;
}

// 한 날짜 노드에서 24시간(KST) 분포를 추출. 리프 타임스탬프(ms)가 있을 때만 동작.
// 반환: { counts:[24], total:n, hasTs:bool, platform:{pf:[24]} }
const KST_OFFSET_MS=9*3600*1000;
function hourBucketsFor(node, platformFilter){
  const counts=new Array(24).fill(0);
  const byPf={};
  let total=0, hasTs=false;
  function leafTs(v){
    // 타임스탬프로 인정: 12자리 이상 숫자(ms) 또는 그런 문자열
    if(typeof v==='number' && v>1e11) return v;
    if(typeof v==='string' && /^\d{12,}$/.test(v)) return +v;
    return null;
  }
  // node = {platform:{ver:{id:ts}}} (플랫폼 계층) 또는 {ver:{id:ts}} (레거시)
  function walkIds(idnode, pf){
    if(idnode==null) return;
    if(typeof idnode!=='object'){ return; }
    for(const id in idnode){
      const ts=leafTs(idnode[id]);
      if(ts!=null){
        hasTs=true;
        const h=new Date(ts+KST_OFFSET_MS).getUTCHours();
        counts[h]++; total++;
        (byPf[pf]||(byPf[pf]=new Array(24).fill(0)))[h]++;
      }
    }
  }
  function walkVersions(vnode, pf){
    if(vnode==null||typeof vnode!=='object') return;
    for(const ver in vnode) walkIds(vnode[ver], pf);
  }
  if(node && typeof node==='object'){
    const keys=Object.keys(node);
    const hasPlatform = keys[0]!==undefined && KNOWN_PLATFORMS.includes(String(keys[0]).toLowerCase());
    if(hasPlatform){
      for(const pf in node){
        const pfl=String(pf).toLowerCase();
        if(!KNOWN_PLATFORMS.includes(pfl)) continue;
        if(platformFilter && platformFilter!=='all' && pfl!==platformFilter) continue;
        walkVersions(node[pf], pfl);
      }
    }else{
      if(!platformFilter || platformFilter==='all' || platformFilter==='unknown')
        walkVersions(node, 'unknown');
    }
  }
  return {counts,total,hasTs,byPf};
}

class MockSource{
  constructor(){this.db=window.JS_DB;this.kind='mock'}
  async init(){await new Promise(r=>setTimeout(r,260));return true}
  async listApps(){
    return this.db.info.map((a,i)=>({appId:a.appId,appName:a.appName,description:a.description,
      iconImage:a.iconImage||'',version:a.version,updateDate:a.updateDate,iconColor:a.iconColor||hashColor(a.appId||String(i))}));
  }
  // returns { metricKey: { 'YYYY-MM-DD': {platform: count} } }
  async fetchApp(appId,build){
    await new Promise(r=>setTimeout(r,90+Math.random()*120));
    const node=this.db.apps[appId]?.[build]||{};
    const out={};
    for(const m of METRICS){
      out[m.key]={};
      const series=node[m.key]||{};
      for(const date in series){
        if(!isValidDateKey(date)) continue;
        const v=series[date];
        // precounted mock stores {platform: count} already
        out[m.key][date]=(this.db.precounted && v && typeof v==='object' && typeof Object.values(v)[0]==='number')
          ? {...v} : countByPlatform(v);
      }
    }
    return out;
  }
}

class FirebaseSource{
  constructor(cfg){this.cfg=cfg;this.kind='firebase';this.token=null;this.authError='';
    this._q=[];this._active=0;this._MAX=6;}   // 동시 요청 최대 6개 (모바일 안정성)
  // 동시성 제한 래퍼: fn(=()=>fetch...)을 큐에 넣고 순차적으로 풀어준다
  _gate(fn){
    return new Promise((resolve,reject)=>{
      this._q.push({fn,resolve,reject});
      this._pump();
    });
  }
  _pump(){
    while(this._active<this._MAX && this._q.length){
      const {fn,resolve,reject}=this._q.shift();
      this._active++;
      Promise.resolve().then(fn).then(
        v=>{this._active--;this._pump();resolve(v);},
        e=>{this._active--;this._pump();reject(e);}
      );
    }
  }
  async init(){
    // 익명 로그인 시도 → idToken 확보. 실패하더라도 즉시 throw하지 않고
    // 토큰 없이(공개 읽기 규칙일 수 있음) 진행한다. 실제 읽기 가능 여부는 listApps에서 판단.
    this.token=null; this.authError='';
    try{
      const url=`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${this.cfg.apiKey}`;
      const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('연결 시간 초과 (네트워크/방화벽 확인)')),15000));
      const req=fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({returnSecureToken:true})});
      const res=await Promise.race([req,timeout]);
      if(res.ok){
        const data=await res.json();
        this.token=data.idToken;
      }else{
        let msg='';try{const j=await res.json();msg=j.error?.message||'';}catch(e){}
        let hint='';
        if(/ADMIN_ONLY_OPERATION|OPERATION_NOT_ALLOWED/i.test(msg)) hint=' → Firebase 콘솔에서 익명 로그인을 켜세요 (Authentication → Sign-in method → 익명)';
        else if(/CONFIGURATION_NOT_FOUND/i.test(msg)) hint=' → Authentication이 설정되어 있지 않습니다';
        else if(/API_KEY|API key not valid/i.test(msg)) hint=' → API Key를 확인하세요';
        this.authError='익명 로그인 실패('+res.status+')'+(msg?': '+msg:'')+hint;
        console.warn('[init]',this.authError);
      }
    }catch(e){
      this.authError=(e&&e.message)?e.message:String(e);
      console.warn('[init] 로그인 예외 → 토큰 없이 진행:',this.authError);
    }
    return true;
  }
  _u(path,extra){
    // 토큰이 있으면 auth 포함, 없으면 공개 읽기 시도. 캐시버스팅(_ts) 추가.
    const auth=this.token?`auth=${this.token}&`:'';
    return `${this.cfg.dbUrl}/${path}.json?${auth}${extra?extra+'&':''}_ts=${Date.now()}`;
  }
  async listApps(){
    // info를 여러 후보 경로에서 찾는다. 찾은 root를 확정 저장해 이후 fetchApp도 동일 경로 사용.
    const candidates = this.cfg.root!=null
      ? [this.cfg.root, '', 'jsapps']      // 설정된 root 우선, 그다음 루트, jsapps
      : ['', 'jsapps'];
    // 중복 제거
    const tried=[]; const roots=[];
    for(const r of candidates){ const key=String(r); if(!tried.includes(key)){tried.push(key); roots.push(r);} }

    let lastStatus=0, foundInfo=null, foundRoot=null;
    for(const r of roots){
      const prefix = r ? r+'/' : '';
      let res;
      try{ res=await fetch(this._u(`${prefix}info`),{cache:'no-store'}); }
      catch(e){ continue; }
      lastStatus=res.status;
      if(res.status===401||res.status===403){
        // 권한 문제는 경로를 바꿔도 동일하므로 즉시 명확히 안내
        throw new Error('info 읽기 권한 없음('+res.status+')'+(this.token
          ? ' → Realtime Database 규칙에서 ".read": "auth != null" 등을 확인하세요'
          : ' → 익명 로그인이 안 됐고 공개 읽기도 막혀 있습니다.'+(this.authError?(' ('+this.authError+')'):'')));
      }
      if(!res.ok) continue;
      let info; try{ info=await res.json(); }catch(e){ continue; }
      if(info && (Array.isArray(info)?info.length:Object.keys(info).length)){
        foundInfo=info; foundRoot=r; break;
      }
    }

    if(!foundInfo){
      // info를 못 찾으면: 루트(또는 후보 경로)를 얕게 읽어 앱 노드명으로 목록을 구성하는 폴백
      const METRIC_KEYS=['dau','dau-dev','installs','installs-dev','updates','updates-dev','events','events-dev','sales','sales-dev'];
      for(const r of roots){
        const prefix = r ? r+'/' : '';
        // shallow=true 로 최상위 키만 가볍게 받는다 (대용량 회피)
        let res; try{ res=await fetch(this._u(`${prefix==='' ? '' : prefix.slice(0,-1)}`)+'&shallow=true',{cache:'no-store'}); }catch(e){ continue; }
        if(!res.ok) continue;
        let top; try{ top=await res.json(); }catch(e){ continue; }
        if(!top || typeof top!=='object') continue;
        // 앱 후보 = info/apps/platforms 같은 메타 키와 메트릭 키를 제외한 최상위 키
        const skip=new Set(['info','apps','platforms','precounted',...METRIC_KEYS]);
        const appIds=Object.keys(top).filter(k=>!skip.has(k));
        if(appIds.length){
          this.cfg.root=r;
          console.warn('[listApps] info가 비어 루트 스캔으로 앱 목록 구성:', appIds);
          return appIds.map((id,i)=>({appId:id,appName:id,description:'',iconImage:'',version:'',updateDate:'',iconColor:hashColor(id||String(i))}));
        }
      }
      throw new Error('앱 목록(info)을 찾지 못했습니다. 시도한 경로: '
        + roots.map(r=>'"'+(r||'(루트)')+'/info"').join(', ')
        + (lastStatus?(' (마지막 응답 '+lastStatus+')'):''));
    }

    // 찾은 root를 확정 — fetchApp 등 이후 호출에서 동일 경로 사용
    this.cfg.root = foundRoot;
    const info=foundInfo;
    const arr=Array.isArray(info)?info:Object.values(info);
    return arr.filter(Boolean).map((a,i)=>{
      let version=a.version||'', updateDate=a.updateDate||a.updateDates||'';
      if(Array.isArray(a.platforms)){
        const p=a.platforms.find(x=>x&&/ios|android/.test(x.platform||''));
        if(p){version=p.version||version;updateDate=p.updateDates||updateDate}
      }
      return {appId:a.appId,appName:a.appName,description:a.description||'',
        iconImage:a.iconImage||'',version,updateDate,iconColor:a.iconColor||hashColor(a.appId||String(i))};
    });
  }
  /* 최적화된 로딩: 앱 노드 전체(수 MB)를 받지 않고,
     현재 빌드에 필요한 메트릭만, 지정된 날짜 범위(startKey~endKey)만 서버에서 잘라 받는다.
     Firebase REST: orderBy="$key"&startAt&endAt 로 키 범위 쿼리.
     범위 쿼리가 막히면(규칙/인덱스) 해당 메트릭만 전체 폴백. */
  async _fetchSeries(appId, metricKey, startKey, endKey){
    const root=this.cfg.root?this.cfg.root+'/':'';
    const path=`${root}${appId}/${metricKey}`;
    // 1) 범위 쿼리 시도 (동시성 제한 적용)
    if(startKey && endKey){
      const extra=`orderBy=%22%24key%22&startAt=%22${startKey}%22&endAt=%22${endKey}%22`;
      try{
        const res=await this._gate(()=>fetch(this._u(path,extra),{cache:'no-store'}));
        if(res.ok){ const j=await res.json(); return j||{}; }
      }catch(e){}
    }
    // 2) 폴백: 메트릭 노드 전체
    try{
      const res=await this._gate(()=>fetch(this._u(path),{cache:'no-store'}));
      if(res.ok){ const j=await res.json(); return j||{}; }
    }catch(e){}
    return {};
  }

  async fetchApp(appId,build,opts){
    const suffix = build==='dev' ? '-dev' : '';
    const startKey = opts && opts.startKey;
    const endKey = opts && opts.endKey;
    const out={};
    out._hours={};
    // 현재 빌드에 해당하는 메트릭 키만 받는다 (예: appstore→dau, dev→dau-dev)
    const jobs=METRICS.map(async m=>{
      const metricKey = m.key + suffix;
      const series = await this._fetchSeries(appId, metricKey, startKey, endKey);
      out[m.key]={};
      out._hours[m.key]={};
      if(series && typeof series==='object'){
        for(const date in series){
          if(!isValidDateKey(date)) continue;
          // 범위가 지정된 경우, 폴백으로 전체를 받았더라도 범위 밖은 버린다
          if(startKey && date<startKey) continue;
          if(endKey && date>endKey) continue;
          out[m.key][date]=countByPlatform(series[date]);
          const hb=hourBucketsFor(series[date]);
          if(hb.hasTs) out._hours[m.key][date]={counts:hb.counts, byPf:hb.byPf, hasTs:true};
        }
      }
    });
    await Promise.all(jobs);
    return out;
  }
}

  },
  // 시간대 데이터가 일부라도 존재하는지(어떤 지표든) — 차트 노출 여부 판단
  hasHourly(appId,dates){
    for(const m of METRICS){ if(this.hourly(appId,m.key,dates)) return true; }
    return false;
  },

  /* ---------- MAU & stickiness (respect platform selection) ----------
     MAU = sum of DAU over the 30 days ending at `iso` (inclusive).
     Stickiness ≈ DAU(iso) / MAU(iso), shown as %. Approximation (no unique-user dedupe). */
  MAU_WINDOW:30,
  windowDates(iso,n){const out=[];for(let i=n-1;i>=0;i--)out.push(shiftISO(iso,-i));return out},

  // app-level MAU at a date
  mauOn(appId,iso){return this.windowDates(iso,this.MAU_WINDOW).reduce((s,d)=>s+this.valueOn(appId,'dau',d),0)},
  // all-apps MAU at a date
  mauTotalOn(iso){return this.apps.reduce((s,a)=>s+this.mauOn(a.appId,iso),0)},
  // stickiness ratio (0..1) at a date
  stickinessOn(appId,iso){const mau=this.mauOn(appId,iso);return mau?this.valueOn(appId,'dau',iso)/mau:0},
  stickinessTotalOn(iso){const mau=this.mauTotalOn(iso);return mau?this.totalOn('dau',iso)/mau:0},
  // average stickiness across a set of dates (all apps)
  avgStickinessTotal(dates){if(!dates.length)return 0;return dates.reduce((s,d)=>s+this.stickinessTotalOn(d),0)/dates.length},
  avgStickinessApp(appId,dates){if(!dates.length)return 0;return dates.reduce((s,d)=>s+this.stickinessOn(appId,d),0)/dates.length},

  /* ---------- controls ---------- */
  async setBuild(b,el){
    if(this.build===b)return;
    this.build=b;
    [...el.parentNode.children].forEach(c=>c.classList.remove('on'));el.classList.add('on');
    this._status(this.src.kind==='firebase'?'live':'mock','로딩…');
    await this._prefetchAll();
    this._status(this.src.kind==='firebase'?'live':'mock',
      this.src.kind==='firebase'?'실시간 · Firebase':'집계 데이터 · 14개 앱');
    this.render();
  },
  async setRange(r,el){
    this.range=(r==='all'?'all':+r);
    [...el.parentNode.children].forEach(c=>c.classList.remove('on'));el.classList.add('on');
    // '전체' 또는 현재 로드 범위보다 긴 기간을 고르면 데이터를 더 받아온다
    await this._ensureLoadedForView();
    this.render();
  },
  async shiftDate(d){
    this.date=shiftISO(this.date,d);
    await this._ensureLoadedForView();
    this.render();
  },

  // 현재 보기(날짜·기간)에 필요한 데이터가 캐시에 있는지 확인하고, 없으면 추가 로딩
  async _ensureLoadedForView(){
    if(!this.src || this.src.kind!=='firebase') return;        // mock은 전체 보유
    if(!this._loadedRange) return;
    // 보기에 필요한 가장 이른 날짜
    let needStart;
    if(this.range==='all'){
      needStart='2000-01-01';                                   // 전체: 사실상 무제한
    }else{
      needStart=shiftISO(this.date, -(this.range-1));
    }
    if(needStart >= this._loadedRange.start) return;            // 이미 충분
    // 더 받아야 함 — 전체 보기는 범위 쿼리 없이 메트릭 전체를, 아니면 넓힌 윈도우를
    const win = this.range==='all'
      ? {startKey:null, endKey:null}                            // 범위 미지정 = 메트릭 전체
      : {startKey:needStart, endKey:toISO(new Date())};
    this._status('live','데이터 더 불러오는 중…');
    await this._prefetchAll(win);
    this._status('live','실시간 · Firebase');
  },
  today(){this._autoDate();this.render()},

  /* ---------- render router ---------- */
  render(){
    // 날짜 표시: 정상 ISO(YYYY-MM-DD)만 점(.)으로 변환, 아니면 원본/폴백 표시
    let label = String(this.date||'');
    const mm = label.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(mm){ label = mm[1]+'.'+mm[2]+'.'+mm[3]; }
    $('#curDate').textContent = label || '—';
    if(this.view==='detail'&&this.curApp){this.renderDetail(this.curApp)}
    else{this.renderHome()}
  },

  /* ---------- HOME ---------- */
  renderHome(){
    $('#dashboard').classList.remove('hide');
    $('#detail').classList.remove('show');
    this.view='home';

    const dates=this.rangeDates();
    const prevDates=this.prevPeriodDates(dates);
    const single = dates.length<=1;

    // KPIs = period totals across apps (respect platform). Delta vs previous comparable period.
    $('#kpis').innerHTML=METRICS.map(m=>{
      const cur=this.periodTotal(m.key,dates);
      const pv=prevDates.length?this.periodTotal(m.key,prevDates):0;
      const hasPrev=prevDates.length>0;
      const delta=hasPrev&&pv?((cur-pv)/pv*100):0;
      const cls=!hasPrev?'flat':delta>0.5?'up':delta<-0.5?'down':'flat';
      const arrow=!hasPrev?'':delta>0.5?'▲':delta<-0.5?'▼':'■';
      const cmp=!hasPrev?'':`<span style="color:#5d6e87">vs 이전 ${this.range}일</span>`;
      const arr=dates.map(d=>this.totalOn(m.key,d));
      const spark=this._sparkPath(arr,64,26);
      // platform breakdown bar (only when viewing all platforms and >1 platform exists)
      let bar='';
      if(this.platform==='all' && this.platforms.length>1){
        const bd=this.periodBreakdown(m.key,dates);
        const tot=Object.values(bd).reduce((s,v)=>s+v,0)||1;
        const seg=this.platforms.map(pf=>{const w=(bd[pf]||0)/tot*100;
          return w>0?`<span style="width:${w.toFixed(1)}%;background:${this._pfColor(pf)}" title="${pf}: ${fmtFull(bd[pf]||0)}"></span>`:''}).join('');
        bar=`<div class="pfbar">${seg}</div>`;
      }
      return `<div class="kpi" style="--c:${m.color}" onclick="App.focusMetric('${m.key}')">
        <div class="klabel"><i></i>${m.label}</div>
        <div class="kval">${fmt(cur)}</div>
        <div class="kdelta ${cls}">${arrow} ${hasPrev?Math.abs(delta).toFixed(1)+'% ':''}${cmp}</div>
        ${bar}
        <svg class="spark" viewBox="0 0 64 26" preserveAspectRatio="none"><path d="${spark}" fill="none" stroke="${m.raw}" stroke-width="1.6"/></svg>
      </div>`;
    }).join('');

    const pfTxt=this.platform==='all'?'전 플랫폼 합계':(this._pfLabel(this.platform)+' 기준');

    // Engagement: MAU (30-day DAU sum) + stickiness (DAU/MAU)
    this._renderEngagement(null,dates);

    $('#chartTitle').textContent='전체 추이';
    $('#chartHint').textContent=`${this.rangeLabel()} · ${pfTxt}`;
    $('#appsHint').textContent=`${this.apps.length}개 앱 · KPI 우수순`;
    const hh=$('#hourlyHint'); if(hh) hh.textContent=`${this.rangeLabel()} · ${pfTxt} · KST`;
    this._renderLegend();
    this._renderMainChart(null);
    this._renderHourly(null);
    this._renderAppGrid();
  },

  // Renders MAU + stickiness cards. appId=null -> all apps (totals). Targets '#engage' inside scope.
  _renderEngagement(appId,dates){
    const root=this._scope();
    const host=root.querySelector('#engage');
    if(!host) return;
    const endIso=this.date;
    const win=this.windowDates(endIso,this.MAU_WINDOW);
    const mau = appId ? this.mauOn(appId,endIso) : this.mauTotalOn(endIso);
    // previous 30-day window for delta
    const prevEnd=shiftISO(win[0],-1);
    const mauPrev = appId ? this.mauOn(appId,prevEnd) : this.mauTotalOn(prevEnd);
    const mauDelta = mauPrev?((mau-mauPrev)/mauPrev*100):0;
    const mauCls=mauPrev?(mauDelta>0.5?'up':mauDelta<-0.5?'down':'flat'):'flat';
    const mauArrow=mauPrev?(mauDelta>0.5?'▲':mauDelta<-0.5?'▼':'■'):'';
    // MAU trend sparkline over the visible range
    const mauArr=dates.map(d=> appId?this.mauOn(appId,d):this.mauTotalOn(d));
    const mauSpark=this._sparkPath(mauArr,84,30);

    // stickiness (DAU/MAU). With 30-day-sum MAU this approximates "active days per month" = ratio*30.
    const stickNow = appId?this.stickinessOn(appId,endIso):this.stickinessTotalOn(endIso);
    const stickAvg = appId?this.avgStickinessApp(appId,dates):this.avgStickinessTotal(dates);
    const stickPct=(stickNow*100);
    const daysPerMonth = stickNow*this.MAU_WINDOW;        // ≈ avg active days / month
    const daysAvg = stickAvg*this.MAU_WINDOW;
    const stickArr=dates.map(d=>(appId?this.stickinessOn(appId,d):this.stickinessTotalOn(d))*this.MAU_WINDOW);
    const stickSpark=this._sparkPath(stickArr,84,30);
    // qualitative band by active days/month (industry rough guide)
    const band = daysPerMonth>=8?{t:'매우 높음',c:'#3ddc97'}:daysPerMonth>=4?{t:'양호',c:'#5b8def'}:daysPerMonth>=2?{t:'보통',c:'#ffb23e'}:{t:'낮음',c:'#ff6b5e'};

    host.innerHTML=`
      <div class="engage-card mau">
        <div class="ec-top">
          <div class="ec-label"><i style="background:#5e8bff"></i>MAU <span class="ec-sub">30일 누적 활성</span></div>
          <svg class="ec-spark" viewBox="0 0 84 30" preserveAspectRatio="none"><path d="${mauSpark}" fill="none" stroke="#5e8bff" stroke-width="1.8"/></svg>
        </div>
        <div class="ec-val">${fmtFull(mau)}</div>
        <div class="ec-meta kdelta ${mauCls}">${mauArrow} ${mauPrev?Math.abs(mauDelta).toFixed(1)+'% vs 직전 30일':'—'}</div>
      </div>
      <div class="engage-card stick">
        <div class="ec-top">
          <div class="ec-label"><i style="background:${band.c}"></i>Stickiness <span class="ec-sub">DAU/MAU · 월 평균 접속일</span></div>
          <svg class="ec-spark" viewBox="0 0 84 30" preserveAspectRatio="none"><path d="${stickSpark}" fill="none" stroke="${band.c}" stroke-width="1.8"/></svg>
        </div>
        <div class="ec-val">${daysPerMonth.toFixed(1)}<span class="ec-unit">일/월</span></div>
        <div class="ec-meta"><span class="ec-band" style="color:${band.c}">${band.t}</span> · DAU/MAU ${stickPct.toFixed(1)}% · 평균 ${daysAvg.toFixed(1)}일</div>
      </div>`;
  },

  // weighted KPI score for ranking apps (period totals, platform-aware)
  _appScore(appId,dates){
    const w={dau:2,installs:1.5,events:1,updates:1,sales:1.5};
    let s=0;for(const m of METRICS){const v=dates.reduce((a,d)=>a+this.valueOn(appId,m.key,d),0);s+=v*(w[m.key]||1);}
    return s;
  },
  _sortedApps(dates){return [...this.apps].sort((a,b)=>this._appScore(b.appId,dates)-this._appScore(a.appId,dates))},

  _pfColor(pf){const c={ios:'#4a9eff',android:'#3ddc97',toss:'#a974ff',web:'#ffa033',unknown:'#7a8aa0'};return c[pf]||'#9fb0c8'},
  _pfLabel(pf){const l={ios:'iOS',android:'Android',toss:'Toss',web:'Web',unknown:'기타'};return l[pf]||pf},
  _iconHtml(a){
    const init=(a.appName||'?').slice(0,2);
    const grad=`linear-gradient(135deg,${a.iconColor},${a.iconColor}99)`;
    if(a.iconImage){
      return `<div class="icon" style="background:${grad}"><img src="${a.iconImage}" alt="" onerror="this.remove()"/></div>`;
    }
    return `<div class="icon" style="background:${grad}">${init}</div>`;
  },

  focusMetric(key){
    // toggle: show only this metric on the chart
    if(this.hidden.size===METRICS.length-1 && !this.hidden.has(key)){this.hidden.clear()}
    else{this.hidden=new Set(METRICS.filter(m=>m.key!==key).map(m=>m.key))}
    this.render();
  },

  _scope(){return this.view==='detail'?$('#detail'):$('#dashboard')},
  _renderLegend(){
    const root=this._scope();
    root.querySelector('#legend').innerHTML=METRICS.map(m=>
      `<span class="lg ${this.hidden.has(m.key)?'off':''}" style="--c:${m.color}" onclick="App.toggleMetric('${m.key}')"><i></i>${m.label}</span>`
    ).join('');
  },
  toggleMetric(key){this.hidden.has(key)?this.hidden.delete(key):this.hidden.add(key);this.render()},

  _renderAppGrid(){
    const dates=this.rangeDates();
    const sorted=this._sortedApps(dates);
    $('#appGrid').innerHTML=sorted.map((a,rank)=>{
      const mini=METRICS.map(m=>{
        const v=dates.reduce((s,d)=>s+this.valueOn(a.appId,m.key,d),0);
        return `<div class="mi"><div class="ml">${m.label}</div><div class="mv" style="color:${m.raw}">${fmt(v)}</div></div>`;
      }).join('');
      const dauArr=dates.map(d=>this.valueOn(a.appId,'dau',d));
      const spark=this._areaSpark(dauArr,290,54);
      const rankCls=rank===0?'r1':rank===1?'r2':rank===2?'r3':'';
      return `<div class="card" onclick="App.openApp('${a.appId}')">
        <div class="rank ${rankCls}">#${rank+1}</div>
        <div class="arrow">↗</div>
        <div class="chead">
          ${this._iconHtml(a)}
          <div><div class="nm">${a.appName}</div><div class="ver">v${a.version||'—'} · ${a.updateDate||''}</div></div>
        </div>
        <div class="mini">${mini}</div>
        <svg class="cspark" viewBox="0 0 290 54" preserveAspectRatio="none">${spark}</svg>
      </div>`;
    }).join('');
  },

  /* ---------- DETAIL ---------- */
  openApp(appId){this.curApp=appId;this.view='detail';this.hidden.clear();window.scrollTo(0,0);this.renderDetail(appId)},
  goHome(){this.curApp=null;this.view='home';window.scrollTo(0,0);this.renderHome()},

  renderDetail(appId){
    const a=this.apps.find(x=>x.appId===appId);if(!a)return this.goHome();
    $('#dashboard').classList.add('hide');
    const det=$('#detail');det.classList.add('show');
    const dates=this.rangeDates();
    const prevDates=this.prevPeriodDates(dates);

    const mcards=METRICS.map(m=>{
      const cur=dates.reduce((s,d)=>s+this.valueOn(appId,m.key,d),0);
      const pv=prevDates.reduce((s,d)=>s+this.valueOn(appId,m.key,d),0);
      const hasPrev=prevDates.length>0;
      const delta=hasPrev&&pv?((cur-pv)/pv*100):0;
      const cls=!hasPrev?'flat':delta>0.5?'up':delta<-0.5?'down':'flat';
      const arrow=!hasPrev?'':delta>0.5?'▲':delta<-0.5?'▼':'■';
      const arr=dates.map(d=>this.valueOn(appId,m.key,d));
      return `<div class="mcard" style="--c:${m.color}">
        <div class="ml"><i></i>${m.label}</div>
        <div class="mv">${fmtFull(cur)}</div>
        <div class="md kdelta ${cls}">${hasPrev?arrow+' '+Math.abs(delta).toFixed(1)+'% vs 이전 '+this.range+'일':'—'}</div>
        <svg class="ms" viewBox="0 0 240 40" preserveAspectRatio="none">${this._areaSpark(arr,240,40,m.raw)}</svg>
      </div>`;
    }).join('');

    // platform breakdown table (per metric x platform, summed over range)
    let pfSection='';
    if(this.platforms.length>1){
      const head=`<tr><th>플랫폼</th>${METRICS.map(m=>`<th style="color:${m.raw}">${m.label}</th>`).join('')}</tr>`;
      const rowFor=(pf)=>{
        const cells=METRICS.map(m=>{
          const v=dates.reduce((s,d)=>s+this.valueOnPlatform(appId,m.key,d,pf),0);
          return `<td>${fmtFull(v)}</td>`;
        }).join('');
        return `<tr><td class="pfname"><i style="background:${this._pfColor(pf)}"></i>${this._pfLabel(pf)}</td>${cells}</tr>`;
      };
      const totalRow=`<tr class="tot"><td>합계</td>${METRICS.map(m=>{
        const v=dates.reduce((s,d)=>{const cell=this.series(appId,m.key)[d];
          return s+(cell?Object.values(cell).reduce((x,y)=>x+y,0):0);},0);
        return `<td>${fmtFull(v)}</td>`;}).join('')}</tr>`;
      pfSection=`
        <div class="sec"><h2>플랫폼별 분포</h2><span class="hint">${this.rangeLabel()} 합계 · 전 플랫폼</span></div>
        <div class="panel"><div class="pftable-wrap"><table class="pftable">${head}${this.platforms.map(rowFor).join('')}${totalRow}</table></div></div>`;
    }

    const pfTxt=this.platform==='all'?'전 플랫폼 합계':(this._pfLabel(this.platform)+' 기준');
    det.innerHTML=`
      <button class="back" onclick="App.goHome()">‹ 전체 보기</button>
      <div class="dhead">
        ${this._iconHtml(a)}
        <div class="dt">
          <h2>${a.appName}</h2>
          <div class="dd">${a.description||''}</div>
          <div class="dmeta"><span>📦 v${a.version||'—'}</span><span>🗓 ${a.updateDate||'—'}</span><span>🏷 ${this.build.toUpperCase()}</span><span>📊 ${pfTxt}</span></div>
        </div>
      </div>
      <div class="metricgrid">${mcards}</div>
      <div class="sec"><h2>참여 지표</h2><span class="hint">MAU · 잔존(Stickiness) · ${pfTxt}</span></div>
      <div class="engage" id="engage"></div>
      <div class="sec"><h2>지표 추이</h2><span class="hint">${this.rangeLabel()} · ${pfTxt}</span></div>
      <div class="panel">
        <div class="charthead"><div class="legend" id="legend"></div></div>
        <div class="chartwrap" style="height:340px"><svg id="mainChart" viewBox="0 0 900 340" preserveAspectRatio="none"></svg><div class="tip" id="tip"></div></div>
      </div>
      <div class="sec"><h2>시간대별 분포</h2><span class="hint">${this.rangeLabel()} · ${pfTxt} · KST</span></div>
      <div class="panel"><div id="hourly" class="hourly"></div></div>
      ${pfSection}`;
    this._renderLegend();
    this._renderEngagement(appId,dates);
    this._renderMainChart(appId);
    this._renderHourly(appId);
  },

  /* ---------- CHARTS ---------- */
  _sparkPath(arr,w,h){
    if(!arr.length)return'';
    const mx=Math.max(...arr,1),mn=Math.min(...arr,0);const rng=mx-mn||1;
    return arr.map((v,i)=>{const x=i/(arr.length-1||1)*w;const y=h-((v-mn)/rng)*(h-3)-1.5;return(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)}).join(' ');
  },
  _areaSpark(arr,w,h,color){
    if(!arr.length)return'';
    const mx=Math.max(...arr,1),mn=Math.min(...arr,0);const rng=mx-mn||1;
    const pts=arr.map((v,i)=>{const x=i/(arr.length-1||1)*w;const y=h-((v-mn)/rng)*(h-4)-2;return[x,y]});
    const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    const c=color||'#5e8bff';const id='g'+Math.random().toString(36).slice(2,7);
    const area=line+` L${w} ${h} L0 ${h} Z`;
    return `<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${c}" stop-opacity=".35"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  },

  _renderMainChart(appId){
    const root=this._scope();
    const svg=root.querySelector('#mainChart');const W=900,H=340,P={l:48,r:16,t:18,b:34};
    const dates=this.rangeDates();
    const active=METRICS.filter(m=>!this.hidden.has(m.key));
    // series values
    const seriesVals={};let gmax=1;
    for(const m of active){
      const vals=dates.map(d=>appId?this.valueOn(appId,m.key,d):this.totalOn(m.key,d));
      seriesVals[m.key]=vals;gmax=Math.max(gmax,...vals);
    }
    gmax=this._niceMax(gmax);
    const innerW=W-P.l-P.r,innerH=H-P.t-P.b;
    const X=i=>P.l+(dates.length<=1?innerW/2:i/(dates.length-1)*innerW);
    const Y=v=>P.t+innerH-(v/gmax)*innerH;

    let g='';
    // grid + y labels
    const ticks=4;
    for(let i=0;i<=ticks;i++){
      const v=gmax/ticks*i;const y=Y(v);
      g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
      g+=`<text x="${P.l-8}" y="${y+4}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="11" fill="#5d6e87">${fmt(Math.round(v))}</text>`;
    }
    // x labels (thin out if many)
    const step=Math.ceil(dates.length/8);
    dates.forEach((d,i)=>{if(i%step===0||i===dates.length-1){
      g+=`<text x="${X(i)}" y="${H-12}" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#5d6e87">${mmdd(d)}</text>`;}});

    // lines + area for each metric
    for(const m of active){
      const vals=seriesVals[m.key];
      const line=vals.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
      const gid='mg'+m.key;
      const area=line+` L${X(dates.length-1)} ${P.t+innerH} L${X(0)} ${P.t+innerH} Z`;
      g+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${m.raw}" stop-opacity="${active.length<=2?.20:.10}"/>
        <stop offset="1" stop-color="${m.raw}" stop-opacity="0"/></linearGradient></defs>`;
      g+=`<path d="${area}" fill="url(#${gid})"/>`;
      g+=`<path d="${line}" fill="none" stroke="${m.raw}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
      // points
      vals.forEach((v,i)=>{g+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.6" fill="#0a0e14" stroke="${m.raw}" stroke-width="2"/>`});
    }
    // hover overlay
    g+=`<rect id="hoverLine" x="0" y="${P.t}" width="1.5" height="${innerH}" fill="#26344a" opacity="0"/>`;
    g+=`<rect x="${P.l}" y="0" width="${innerW}" height="${H}" fill="transparent" id="hitArea"/>`;
    svg.innerHTML=g;

    // interactivity
    const tip=root.querySelector('#tip');const hover=svg.querySelector('#hoverLine');const hit=svg.querySelector('#hitArea');
    const self=this;
    hit.onmousemove=hit.ontouchmove=function(ev){
      const rect=svg.getBoundingClientRect();
      const cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-rect.left;
      const ratio=W/rect.width;const svgX=cx*ratio;
      let i=Math.round((svgX-P.l)/innerW*(dates.length-1));i=Math.max(0,Math.min(dates.length-1,i));
      const px=X(i);hover.setAttribute('x',px);hover.setAttribute('opacity','.8');
      const rows=active.map(m=>`<div class="tr"><span class="nm"><i style="background:${m.raw}"></i>${m.label}</span><span class="vv">${fmtFull(seriesVals[m.key][i])}</span></div>`).join('');
      tip.innerHTML=`<div class="td">${dates[i]}</div>${rows}`;
      tip.style.opacity='1';
      const leftPx=px/ratio;const tipW=tip.offsetWidth;
      tip.style.left=Math.min(rect.width-tipW-6,Math.max(6,leftPx-tipW/2))+'px';
      tip.style.top='8px';
    };
    hit.onmouseleave=function(){tip.style.opacity='0';hover.setAttribute('opacity','0')};
  },

  _niceMax(v){const p=Math.pow(10,Math.floor(Math.log10(v)));const n=v/p;
    const m=n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10;return m*p},

  // 시간대 지표 선택
  setHourMetric(key){this.hourMetric=key;
    if(this.view==='detail'&&this.curApp) this._renderHourly(this.curApp);
    else this._renderHourly(null);
  },

  /* ---------- 시간대(24h) 차트 ---------- */
  // host(#hourly) 안에 칩 + SVG 막대차트를 그린다. appId=null이면 전체.
  _renderHourly(appId){
    const root=this._scope();
    const host=root.querySelector('#hourly');
    if(!host) return;
    const dates=this.rangeDates();
    // 선택 지표가 비활성이거나 데이터 없으면 데이터 있는 지표로 자동 보정
    let mk=this.hourMetric;
    if(!this.hourly(appId,mk,dates)){
      const alt=METRICS.find(m=>this.hourly(appId,m.key,dates));
      if(alt) mk=this.hourMetric=alt.key;
    }
    const data=this.hourly(appId,mk,dates);
    // 지표 선택 칩 (데이터 있는 지표만 활성)
    const chips=METRICS.map(m=>{
      const has=!!this.hourly(appId,m.key,dates);
      const on=m.key===mk;
      return `<button class="hchip ${on?'on':''}" ${has?'':'disabled'} style="--c:${m.raw}"
        onclick="App.setHourMetric('${m.key}')">${m.label}</button>`;
    }).join('');

    if(!data){
      host.innerHTML=`<div class="hourbar-chips">${chips}</div>
        <div class="hourempty">이 기간에는 시간대 데이터가 없습니다. (집계 데이터에는 시각 정보가 없을 수 있어요)</div>`;
      return;
    }

    const W=900,H=240,P={l:40,r:14,t:14,b:28};
    const innerW=W-P.l-P.r, innerH=H-P.t-P.b;
    const counts=data.counts;
    let gmax=this._niceMax(Math.max(...counts,1));
    const bw=innerW/24;
    const color=(METRICS.find(m=>m.key===mk)||{}).raw||'#5e8bff';
    const Y=v=>P.t+innerH-(v/gmax)*innerH;

    let g='';
    // y 그리드 + 라벨
    const ticks=4;
    for(let i=0;i<=ticks;i++){
      const v=gmax/ticks*i, y=Y(v);
      g+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
      g+=`<text x="${P.l-8}" y="${y+4}" text-anchor="end" font-family="'JetBrains Mono',monospace" font-size="11" fill="#5d6e87">${fmt(Math.round(v))}</text>`;
    }
    // 막대 (data-h로 시각 식별) + 시간 라벨
    const peak=Math.max(...counts);
    for(let h=0;h<24;h++){
      const x=P.l+h*bw, val=counts[h];
      const bh=(val/gmax)*innerH, y=P.t+innerH-bh;
      const isPeak=val===peak&&val>0;
      // 클릭/터치 히트영역을 위해 막대 전체 높이만큼 투명 rect도 추가
      g+=`<rect class="hbar-hit" data-h="${h}" x="${(x).toFixed(1)}" y="${P.t}" width="${bw.toFixed(1)}" height="${innerH}" fill="transparent" style="cursor:pointer"></rect>`;
      g+=`<rect class="hbar" data-h="${h}" x="${(x+1.5).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-3).toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}"
        rx="3" fill="${color}" fill-opacity="${isPeak?'1':'0.55'}" style="pointer-events:none;transition:fill-opacity .12s"></rect>`;
      if(h%3===0) g+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-10}" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#5d6e87">${String(h).padStart(2,'0')}</text>`;
    }
    const peakH=counts.indexOf(peak);
    const meta = peak>0
      ? `피크 <b style="color:${color}">${String(peakH).padStart(2,'0')}:00</b> · 합계 ${fmtFull(data.total)} · ${dates.length>1?this.rangeLabel()+' 누적':'당일'} · KST`
      : `데이터 없음`;

    host.innerHTML=`
      <div class="hourbar-chips">${chips}</div>
      <div class="hourmeta">${meta}</div>
      <div class="hourchart">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="hoursvg">${g}</svg>
        <div class="tip" id="hourtip"></div>
      </div>`;

    // ---- 터치/클릭/호버 툴팁 ----
    const wrap=host.querySelector('.hourchart');
    const svg=host.querySelector('.hoursvg');
    const tip=host.querySelector('#hourtip');
    const label=(METRICS.find(m=>m.key===mk)||{}).label||mk;
    const bars=Array.from(svg.querySelectorAll('.hbar'));
    const showAt=(h)=>{
      const val=counts[h];
      const pct=data.total>0?(val/data.total*100):0;
      // 플랫폼별 분해 (값 큰 순) — 앱 상세와 동일한 플랫폼 색/라벨 사용
      let pfRows='';
      const pfh=data.byPfHour||{};
      const entries=Object.keys(pfh).map(p=>[p,pfh[p][h]]).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);
      if(entries.length){
        pfRows=entries.map(([p,v])=>`<div class="tr"><span class="nm"><i style="background:${this._pfColor(p)}"></i>${this._pfLabel(p)}</span><span class="vv">${fmtFull(v)}</span></div>`).join('');
      }
      tip.innerHTML=`<div class="td">${String(h).padStart(2,'0')}:00 – ${String((h+1)%24).padStart(2,'0')}:00 KST</div>`
        +`<div class="tr"><span class="nm"><i style="background:${color}"></i>${label}</span><span class="vv">${fmtFull(val)}</span></div>`
        +`<div class="tr"><span class="nm">전체 대비</span><span class="vv">${pct.toFixed(1)}%</span></div>`
        +(pfRows?`<div class="tipdiv"></div>${pfRows}`:'');
      tip.style.opacity='1';
      // 위치: 막대 중앙 위
      const rect=svg.getBoundingClientRect();
      const ratio=rect.width/W;
      const cx=(P.l+h*bw+bw/2)*ratio;
      const tipW=tip.offsetWidth||160;
      tip.style.left=Math.min(rect.width-tipW-6,Math.max(6,cx-tipW/2))+'px';
      tip.style.top='6px';
      // 막대 강조
      bars.forEach(b=>{const bh=+b.getAttribute('data-h');b.setAttribute('fill-opacity',bh===h?'1':'0.28');});
    };
    const hide=()=>{tip.style.opacity='0';
      const pk=counts.indexOf(peak);
      bars.forEach(b=>{const bh=+b.getAttribute('data-h');b.setAttribute('fill-opacity',(bh===pk&&peak>0)?'1':'0.55');});
    };
    const hForEvent=(clientX)=>{
      const rect=svg.getBoundingClientRect();
      const xInSvg=(clientX-rect.left)/rect.width*W;
      let h=Math.floor((xInSvg-P.l)/bw);
      return Math.max(0,Math.min(23,h));
    };
    // PC 호버
    wrap.addEventListener('mousemove',e=>{ showAt(hForEvent(e.clientX)); });
    wrap.addEventListener('mouseleave',hide);
    // 모바일/터치 + 클릭: 탭/드래그한 시간 툴팁 표시
    wrap.addEventListener('touchstart',e=>{
      if(e.touches&&e.touches[0]){ showAt(hForEvent(e.touches[0].clientX)); }
    },{passive:true});
    wrap.addEventListener('touchmove',e=>{
      if(e.touches&&e.touches[0]){ showAt(hForEvent(e.touches[0].clientX)); }
    },{passive:true});
    // 차트 밖을 탭하면 닫기
    if(!this._hourTipDocBound){
      this._hourTipDocBound=true;
      document.addEventListener('click',ev=>{
        const w=this._scope().querySelector('.hourchart');
        const t=this._scope().querySelector('#hourtip');
        if(w&&t&&!w.contains(ev.target)) t.style.opacity='0';
      });
    }
  },

  /* ---------- settings ---------- */
  openSettings(){
    const c=this._loadCfg()||{};
    $('#cfgApiKey').value=c.apiKey||this.DEFAULT_CFG.apiKey;
    $('#cfgDbUrl').value=c.dbUrl||this.DEFAULT_CFG.dbUrl;
    $('#cfgRoot').value=(c.root!=null?c.root:this.DEFAULT_CFG.root);
    $('#modal').classList.add('show');
  },
  closeSettings(){$('#modal').classList.remove('show')},
  async saveSettings(){
    const cfg={apiKey:$('#cfgApiKey').value.trim(),dbUrl:$('#cfgDbUrl').value.trim().replace(/\/$/,''),root:$('#cfgRoot').value.trim()};
    if(!cfg.apiKey||!cfg.dbUrl){alert('API Key와 Database URL을 입력하세요.');return;}
    this._saveCfg(cfg);this.closeSettings();this.cache={};
    this.view='home';this.curApp=null;
    $('#detail').classList.remove('show');$('#dashboard').classList.remove('hide');
    await this.start();
  },
  _loadCfg(){try{return JSON.parse(sessionStorage.getItem('jsapps_cfg'))}catch(e){return null}},
  _saveCfg(c){try{c?sessionStorage.setItem('jsapps_cfg',JSON.stringify(c)):sessionStorage.removeItem('jsapps_cfg')}catch(e){}},

  _status(kind,txt){const d=$('#statusDot');d.className='dot '+(kind==='live'?'live':kind==='mock'?'mock':kind==='err'?'err':'');$('#statusTxt').textContent=txt},
};

window.addEventListener('DOMContentLoaded',()=>App.start());
window.addEventListener('click',e=>{if(e.target.id==='modal')App.closeSettings()});

</script>
</body>
</html>
