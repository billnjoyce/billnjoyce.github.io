<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joyce Studios</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p.subtitle {
      color: #6b7280;
      margin-bottom: 30px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 30px 0;
    }

    li {
      margin: 10px 0;
    }

    a.app-link {
      display: block;
      padding: 12px;
      border-radius: 10px;
      background: #f3f4f6;
      text-decoration: none;
      color: #111827;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    a.app-link:hover {
      background: #111827;
      color: white;
    }

    .contact {
      font-size: 14px;
      color: #6b7280;
    }

    .contact a {
      color: #2563eb;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Joyce Studios</h1>
    <p class="subtitle">We build simple and useful apps.</p>

    <ul>
      <li><a class="app-link" href="https://billnjoyce.github.io/caroil/ko/branding/index.html">🚗 OilPick</a></li>
      <!--li><a class="app-link" href="/success/">📱 The Success</a></li-->
    </ul>

    <div class="contact">
      Contact: <a href="mailto:ibillkim@gmail.com">ibillkim@gmail.com</a>
    </div>
  </div>
</body>
</html>
